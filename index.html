<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>StudyDay — Workday HCM Study</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap');
  :root{
    --blue:#2C69B6; --blueDark:#12283F; --orange:#F4990B; --amber:#FDBA58;
    --bg:#F7F9FC; --surface:#FFFFFF; --gray:#6B7785; --border:#E3E8EF; --green:#1E9E6B; --red:#D0483F;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:'Inter',Arial,sans-serif;color:var(--blueDark);}
  h1,h2,h3,.wd-h{font-family:'Sora','Segoe UI',sans-serif;color:var(--blueDark);}
  button{font-family:inherit;}
  .wd-header{background:var(--surface);border-bottom:1px solid var(--border);}
  .wd-header-inner{max-width:1600px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
  .logo-btn{display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;}
  main{max-width:1600px;margin:0 auto;padding:28px 20px 80px;}
  .btn-primary{background:linear-gradient(135deg,var(--orange),var(--amber));color:var(--blueDark);font-weight:700;border:none;border-radius:10px;padding:10px 18px;cursor:pointer;font-size:14px;transition:transform .15s,box-shadow .15s;}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(244,153,11,.35);}
  .btn-primary:disabled{opacity:.5;cursor:default;transform:none;box-shadow:none;}
  .btn-secondary{background:var(--surface);color:var(--blue);font-weight:600;border:1.5px solid var(--blue);border-radius:10px;padding:9px 16px;cursor:pointer;font-size:14px;}
  .btn-secondary:hover{background:#EEF4FC;}
  .btn-danger{background:var(--red);color:#fff;border:none;border-radius:10px;padding:9px 16px;cursor:pointer;font-weight:700;font-size:14px;}
  .btn-ghost{background:transparent;color:var(--gray);border:none;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;gap:6px;padding:6px;}
  .btn-ghost:hover{color:var(--blueDark);}
  .wd-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;transition:box-shadow .15s,transform .15s;}
  .wd-card.clickable:hover{box-shadow:0 8px 24px rgba(18,40,63,.08);transform:translateY(-2px);cursor:pointer;}
  .wd-input{border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;width:100%;color:var(--blueDark);background:#fff;}
  .wd-input:focus{outline:none;border-color:var(--blue);}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--blueDark);color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:50;}
  .grid-sets{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
  .grid-modes{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;}
  .hero{position:relative;padding:36px 32px;border-radius:18px;background:var(--blueDark);overflow:hidden;margin-bottom:32px;}
  @media (max-width:640px){ .hero-arc{display:none;} }
  .icon-box{width:34px;height:34px;border-radius:9px;background:#EEF4FC;display:flex;align-items:center;justify-content:center;}
  .progress-track{flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--amber));transition:width .3s ease;}
  .flip-scene{perspective:1200px;cursor:pointer;margin-top:20px;height:320px;}
  .flip-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,.2,.2,1);}
  .flip-inner.flipped{transform:rotateY(180deg);}
  .flip-face{position:absolute;inset:0;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;}
  .flip-face.back{transform:rotateY(180deg);background:var(--blueDark);color:#fff;}
  .flip-face.front{background:var(--surface);}
  .modal-overlay{position:fixed;inset:0;background:rgba(18,40,63,.45);display:flex;align-items:center;justify-content:center;z-index:60;}
  .modal-box{background:#fff;border-radius:14px;padding:24px;max-width:340px;width:90%;max-height:85vh;overflow-y:auto;}
  .match-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .match-tile{min-height:90px;padding:10px;font-size:12.5px;cursor:pointer;text-align:left;line-height:1.35;}
  .match-tile.hidden{visibility:hidden;}
  .option-btn{text-align:left;padding:14px 16px;border-radius:10px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:14px;display:flex;justify-content:space-between;align-items:center;width:100%;}
  .row-center{display:flex;justify-content:center;gap:14px;}
  .card-editor-row{display:grid;grid-template-columns:28px 1fr 1fr 32px;gap:10px;align-items:center;padding:14px;}
  @media (max-width:600px){
    .card-editor-row{grid-template-columns:20px 1fr 1fr 28px;}
    .match-grid{grid-template-columns:repeat(2,1fr);}
  }
  @media (prefers-reduced-motion: reduce){ .wd-card,.btn-primary,.flip-inner{transition:none!important;} }

  #login-gate{position:fixed;inset:0;background:var(--blueDark);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;}
  .login-card{background:#fff;border-radius:16px;padding:32px 28px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35);}

  #splash{position:fixed;inset:0;background:var(--blueDark);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:200;transition:opacity .4s ease;}
  #splash.fade-out{opacity:0;pointer-events:none;}
  #splash-logo-slot{animation:splashPulse 1.5s ease-in-out infinite;}
  @keyframes splashPulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.07);opacity:.85;}}
  .splash-text{font-family:'Sora',sans-serif;color:#fff;font-size:19px;font-weight:700;letter-spacing:.4px;}
  @media (prefers-reduced-motion: reduce){ #splash-logo-slot{animation:none;} }

  #main-slot.view-enter{opacity:0;transform:translateY(8px);}
  #main-slot.view-enter-active{opacity:1;transform:translateY(0);transition:opacity .28s ease,transform .28s ease;}
  @media (prefers-reduced-motion: reduce){ #main-slot.view-enter,#main-slot.view-enter-active{opacity:1;transform:none;transition:none;} }

  .sidebar-overlay{position:fixed;inset:0;background:rgba(18,40,63,.4);z-index:90;}
  .sidebar-panel{position:fixed;top:0;left:0;bottom:0;width:260px;max-width:82vw;background:#fff;z-index:91;box-shadow:8px 0 30px rgba(0,0,0,.2);padding:20px 16px;overflow-y:auto;animation:sidebarIn .22s ease;}
  @keyframes sidebarIn{from{transform:translateX(-100%);}to{transform:translateX(0);}}
  .folder-item{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;text-align:left;background:none;border:none;border-radius:8px;padding:10px 10px;cursor:pointer;font-size:14px;color:var(--blueDark);font-family:'Inter',sans-serif;}
  .folder-item:hover{background:var(--bg);}
  .folder-item.active{background:#EEF4FC;color:var(--blue);font-weight:600;}
  @media (prefers-reduced-motion: reduce){ .sidebar-panel{animation:none;} }

  .admin-hub-wrap{display:flex;gap:28px;align-items:flex-start;}
  .admin-sidebar{width:200px;flex-shrink:0;display:flex;flex-direction:column;gap:2px;position:sticky;top:20px;}
  .admin-main{flex:1;min-width:0;}
  @media (max-width:760px){
    .admin-hub-wrap{flex-direction:column;}
    .admin-sidebar{width:100%;flex-direction:row;flex-wrap:wrap;position:static;}
  }

  .dashboard-layout{display:flex;gap:24px;align-items:flex-start;}
  .dashboard-main{flex:1;min-width:0;}
  .leaderboard-widget{width:270px;flex-shrink:0;position:sticky;top:20px;}
  @media (max-width:820px){
    .dashboard-layout{flex-direction:column;}
    .leaderboard-widget{width:100%;position:static;}
  }
  .cert-slide{animation:certSlideIn .5s cubic-bezier(.22,.61,.36,1);}
  @keyframes certSlideIn{from{opacity:0;transform:translateX(32px);}to{opacity:1;transform:translateX(0);}}
  @media (prefers-reduced-motion: reduce){ .cert-slide{animation:none;} }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body>
<div id="login-gate">
  <div class="login-card">
    <div id="login-logo-slot" style="display:flex;flex-direction:column;align-items:center;margin-bottom:6px;"></div>
    <p style="font-size:13px;color:var(--gray);margin:0 0 20px;">Sign in with your team credentials to continue.</p>
    <input class="wd-input" id="login-username" placeholder="Username" autocomplete="username" style="margin-bottom:10px;">
    <input class="wd-input" id="login-password" type="password" placeholder="Password" autocomplete="current-password" style="margin-bottom:6px;">
    <p id="login-error" style="color:var(--red);font-size:12.5px;min-height:16px;margin:6px 0 12px;text-align:left;"></p>
    <button class="btn-primary" id="login-submit" style="width:100%;">Log in</button>
  </div>
</div>
<div id="splash">
  <div id="splash-logo-slot"></div>
  <div class="splash-text">StudyDay</div>
</div>
<div id="root"></div>

<script>
/* ---------------- Data / starter content ---------------- */
const SCM_CARDS_SEED_ID = "scm-cards-seed-v1";
const SCM_CARDS_DATA = [{"term": "Custom Validation", "definition": "A configurable rule that checks a transaction's data quality and generates an error (hard stop) or warning message when the transaction is submitted.", "explanation": "Consists of a transaction type, error message, and condition rules. Runs at submission, not during data entry."}, {"term": "Critical vs. Warning severity on a custom validation", "definition": "Critical is a hard stop the user must resolve before continuing; Warning is a message the user can bypass.", "explanation": "Both execute when the transaction is submitted, not while the user is typing."}, {"term": "Where do you create a new custom validation?", "definition": "The Maintain Custom Validations report, then select the transaction/task and choose New Validation.", "explanation": ""}, {"term": "Condition rule (in the context of custom validations)", "definition": "One or more rules describing the criteria that make a transaction invalid — you're writing the rule to search for what's wrong, not what's right.", "explanation": "Custom validations resolve to a negative — they look for a bad condition."}, {"term": "Maintain Worktag Usage", "definition": "The task used to control which worktags are allowed, highlighted, or required on a given transaction type.", "explanation": "You can't technically make a brand-new field required — only Workday can do that — but you can require a worktag."}, {"term": "Primary Worktag", "definition": "A worktag shown as its own individual field/column on a transaction; up to 10 primary worktags are allowed per transaction.", "explanation": ""}, {"term": "Additional Worktag", "definition": "A worktag Workday presents in a multiselect field rather than its own column; marking one required adds an asterisk to the field.", "explanation": ""}, {"term": "Tenant Wide worktag requirement vs. company-specific requirement", "definition": "A Primary worktag set as required applies across the whole tenant; to require a worktag on only one company, use a Custom Validation instead.", "explanation": "This is a very common exam scenario: 'required for one company only' always points to Custom Validations, not Maintain Worktag Usage."}, {"term": "Maintain Related Worktag Usage", "definition": "Lets you configure a worktag to automatically populate on a transaction based on another object — e.g., a Region worktag that defaults in whenever a specific Cost Center is used.", "explanation": "Configurable objects include Cost Center, Customer, Project, Region, Revenue Category, and Spend Category."}, {"term": "Worktag", "definition": "A keyword/label representing a business dimension (like customer or product) used to tag transactions for reporting outside the traditional accounting code block.", "explanation": "Workday delivers more than 73 worktag types."}, {"term": "Custom Worktags (limit)", "definition": "Workday allows up to 15 custom worktags per tenant, manually defined and enabled.", "explanation": "Don't confuse this with Custom Organizations, which allow up to 10 to be used as financial worktags."}, {"term": "Custom Organization as a financial worktag (limit)", "definition": "Up to 10 custom organizations can be flagged 'Use as Financial Worktag,' even though you can create an unlimited number of custom organizations overall.", "explanation": ""}, {"term": "Built-in vs. Defaulted vs. User-entered vs. Related worktags", "definition": "Built-in: essential, separate fields on the transaction (e.g., supplier name). Defaulted: auto-assigned from the worker's own organization assignments. User-entered: picked by the user. Related: automatically carried over from an associated object (e.g., a customer's cost center).", "explanation": ""}, {"term": "Reorganization event", "definition": "Groups related organizational changes (creating a company, cost center, etc.) together under one effective date for tracking and auditing.", "explanation": "Required any time you create OR reorganize a company, cost center, or supervisory organization."}, {"term": "Company organization", "definition": "Represents a legal entity — the primary organization for all business processes in Workday Financial Management.", "explanation": ""}, {"term": "Cost Center", "definition": "An organization used to hold financial transactions, budgets, and workers — generally should have a manager, financial impact, and a budget.", "explanation": "Cost center hierarchies can only store cost centers, used for reporting rollups."}, {"term": "Organization hierarchies and transactions", "definition": "Organization hierarchies do not store transactions themselves — Workday only assigns transactions to the base organizations, not the hierarchy.", "explanation": "Hierarchies exist for reporting rollups and can support inherited security."}, {"term": "Period Status: Open vs. Closed vs. Adjustments Only", "definition": "Open allows all activity types (operational journals, external feeds, payroll, accounting journals). Closed allows nothing. Adjustments Only allows only journal adjustment activity.", "explanation": ""}, {"term": "Roll Forward Year-End Balances", "definition": "Creates or replaces beginning balances for the next fiscal year so you can report on new-year activity using rolled-forward balances before the current year fully closes.", "explanation": ""}, {"term": "Reopening a closed ledger year", "definition": "Use the Reopen Ledger Year task — a closed year is available for reporting but not for processing until reopened.", "explanation": ""}, {"term": "Which organization type represents a legal entity?", "definition": "Company.", "explanation": "Business Units, Cost Centers, and Funds don't represent the legal entity itself."}, {"term": "Which statement is true of custom worktags?", "definition": "Custom worktag values can belong to a hierarchy.", "explanation": "There's a limit of 15 custom worktag types (not 10, and not unlimited)."}, {"term": "Setting up a 'ship' that needs financial transactions, worker assignment, and a custom security group ('Ship's Captain') — which feature?", "definition": "A custom organization.", "explanation": "Custom organizations support worker assignment and role-based security, which a worktag alone does not."}, {"term": "Setting up a 'port of registration' that needs no hierarchy, no security, and no workers — which feature?", "definition": "A custom worktag.", "explanation": "When you don't need hierarchy, security, or worker assignment, a worktag is the lighter-weight option versus a custom organization."}, {"term": "Account Posting Rule", "definition": "Tells Workday which ledger account to post a journal to based on the results of an operational transaction, using defined conditions.", "explanation": "Each posting rule is specific to one operational transaction type."}, {"term": "Accounting Journal vs. Operational Journal", "definition": "Accounting Journals are entered manually by accountants and aren't tied to a transaction. Operational Journals are created automatically by Workday from transactions like supplier invoices.", "explanation": ""}, {"term": "Dimensions vs. Values in posting rule conditions", "definition": "Workday treats multiple dimensions as AND logic, and multiple values within a dimension as OR logic.", "explanation": "Very commonly tested distinction — dimensions = AND, values = OR."}, {"term": "Posting rule Evaluation Order", "definition": "Conditions are placed from most to least restrictive; Workday evaluates top-down and posts to the first matching condition it finds.", "explanation": "Put the more specific/restrictive rule first, or a broader rule may match before it ever gets evaluated."}, {"term": "What happens if an operational journal doesn't meet any posting rule condition and has no default account?", "definition": "Workday flags it as an error — the transaction is processed, but the operational journal goes into error status rather than posting.", "explanation": "Find these using the Fix Operational Journals with Errors report."}, {"term": "Accountant / Accounting Manager / Controller security groups", "definition": "Accountant performs accounting functions for assigned orgs. Accounting Manager can also open/close ledger periods and years. Controller can view all financials/spend setup and may have approval authority.", "explanation": ""}, {"term": "Reversal Journal", "definition": "Created by checking 'Create Reversal' and entering a reversal date on or after the accounting date; if the period isn't open yet, it's created in Created status until the period opens.", "explanation": "Use Mass Post Reversal Journals to post reversals once the period opens."}, {"term": "Recurring Journal", "definition": "A journal with the same lines/accounts/amounts that needs to be created on a regular basis; you can create future-dated recurring reversal journals.", "explanation": ""}, {"term": "Journal status: Created", "definition": "Saved but not yet submitted — can still be edited, canceled, deleted, or submitted.", "explanation": ""}, {"term": "Journal status: In Progress", "definition": "Submitted to the business process, which hasn't completed yet. Workday assigns the Journal ID at this point but the journal isn't yet reflected in financial statements.", "explanation": ""}, {"term": "Journal status: Posted", "definition": "Posted to a ledger and included in financial reports. You can only unpost it (not directly delete/cancel it) to take further action.", "explanation": ""}, {"term": "Canceling a Posted journal", "definition": "You must first unpost it, then cancel it.", "explanation": "You can only unpost a journal if the period isn't closed."}, {"term": "EIB — Get Data component", "definition": "Defines the data Workday receives from (or extracts to) an external source and where that data lives (e.g., a spreadsheet, a specific report).", "explanation": ""}, {"term": "EIB — Transform component", "definition": "Converts data into a format Workday or the receiving endpoint can understand, using delivered or custom transformations.", "explanation": ""}, {"term": "EIB — Deliver component", "definition": "Defines how Workday imports/exports data to an external endpoint, such as email, sFTP, or web services.", "explanation": ""}, {"term": "Importing an Accounting Journal via EIB", "definition": "Set Automatically Complete to Y on the spreadsheet to bypass reviews, To Dos, and notifications and auto-trigger the Accounting Journal Event business process.", "explanation": "You need each object's Reference ID — run the Integration IDs report to find them."}, {"term": "Procure to Pay lifecycle steps", "definition": "Supplier Contracts → Requisition → Source/Create PO → Issue PO → Receive → Invoice → Settle Payment.", "explanation": "This is the backbone sequence the whole certification is organized around."}, {"term": "Edit Tenant Setup - Financials", "definition": "The task where you configure tenant-wide procurement options that apply across every company (as opposed to Edit Company Procurement Options, which is per-company).", "explanation": ""}, {"term": "Automatically Close Purchase Orders", "definition": "A tenant option that auto-closes a PO once it's both fully received (with approved receipts) and fully paid.", "explanation": "Workday does not retroactively close already-received/paid POs from before you enabled the option, and it won't auto-reopen a closed PO if something later changes."}, {"term": "Enable Multi-Company (procurement option)", "definition": "Allows multiple companies on requisition and PO lines; enabling Requisitions auto-enables Purchase Orders (but disabling Requisitions doesn't auto-disable POs).", "explanation": ""}, {"term": "Which task lets you create ledger years and periods to begin setting up a new company for financial transactions?", "definition": "Create ledger year and ledger periods — this comes before you can post any transactions.", "explanation": "This is the first setup step, ahead of things like account posting rules or opening periods."}, {"term": "Edit Company Accounting Details — what can it NOT configure?", "definition": "Opening the ledger periods for the company — that's handled separately (e.g., via Update Ledger Period Status), not through Edit Company Accounting Details.", "explanation": "It does handle the fiscal schedule, account posting rules, and journal reversal options."}, {"term": "A user can't run Mass Update Ledger Period Status for a new company, but their coworker can — what's the likely issue?", "definition": "The user belongs to the right security group for the business process/task, but hasn't been assigned the correct role for the new company.", "explanation": "Security group access and role assignment for a specific company are two separate things — both are needed."}, {"term": "A user has the right role and security group but still can't find the new company in Mass Update Ledger Periods — why?", "definition": "The company's ledger year and periods aren't yet in the correct state to be opened.", "explanation": ""}, {"term": "When configuring account posting rules, which statement is true about dimensions and values?", "definition": "Multiple dimensions are always read as AND; multiple values are always read as OR.", "explanation": "This is fixed Workday behavior, not something you configure per rule."}, {"term": "An operational transaction can't derive a ledger account from posting rules — what happens?", "definition": "The supplier invoice can still be processed, but the resulting operational journal goes into error status.", "explanation": "Processing of the source document isn't blocked — only the journal fails to post."}, {"term": "How does Workday evaluate account posting rule conditions?", "definition": "From the top of the list down, using the most restrictive conditions placed first.", "explanation": ""}, {"term": "What should be updated on a new organization to simplify importing data via EIB?", "definition": "The Organization Reference ID.", "explanation": "EIB spreadsheets rely on Reference IDs to identify objects; setting a clear one on new orgs makes future imports easier."}, {"term": "A journal can be Canceled, Edited, or Submitted from Related Actions — but not Deleted. What status is it?", "definition": "In Progress.", "explanation": "Created-status journals can still be deleted; In Progress journals cannot."}, {"term": "Supplier Category", "definition": "A required, single classification every supplier must have (exactly one) — used for search, reporting, and account posting rules.", "explanation": "Contrast with Supplier Group, which is optional and a supplier can belong to zero, one, or many."}, {"term": "Supplier Group", "definition": "An optional way to organize suppliers into useful groupings for reporting/selection; a supplier can be in multiple groups, though Workday discourages using groups in account posting rules for that reason.", "explanation": ""}, {"term": "How many supplier categories must be selected for each supplier?", "definition": "Exactly one — it's required, and only one.", "explanation": ""}, {"term": "Order-From Connection", "definition": "Lets one supplier have multiple ordering addresses/divisions/methods you can order from — e.g., a supplier with separate East Coast and West Coast distribution locations.", "explanation": "Distinct from Remit-To Connections, which govern where payments/invoices go."}, {"term": "A supplier sells motors from two US regional locations — what do you set up to reflect this?", "definition": "Order-From connections.", "explanation": "One supplier record, multiple order-from connections for the different shipping locations."}, {"term": "Supplier Hierarchy", "definition": "Defines parent/child relationships between suppliers, enabling rolled-up reporting on totals and letting a parent's payment apply to a child's invoices (or vice versa).", "explanation": "Useful for 1099 reporting when multiple suppliers share a tax ID."}, {"term": "Managing a supplier's global trading entities to see total spend across all of them — which feature?", "definition": "Supplier Hierarchies.", "explanation": "Rolls child supplier activity up to the parent for consolidated reporting."}, {"term": "Supplier duplicate detection fields", "definition": "Workday can check for duplicates using Bank Account, Contact Email, Supplier Name, Supplier Alternate Names, Contact Phone, and Contact Email.", "explanation": "Parent/child suppliers on a hierarchy are excluded from the Find Supplier Duplicates report so they don't falsely register as duplicates."}, {"term": "Purchase Item", "definition": "The master item record in Workday — not necessarily tied to any one supplier — that can link to multiple supplier or catalog items.", "explanation": ""}, {"term": "Catalog Item", "definition": "Tied to a supplier contract; selecting one in a requisition auto-issues the PO and bypasses buyer review.", "explanation": ""}, {"term": "Supplier Item", "definition": "Attributes specific to the supplier you have a contract with — supplier item ID, price, UOM, manufacturer, and sourcing priority setup.", "explanation": ""}, {"term": "Web Item", "definition": "A supplier item purchased via punchout to an external supplier website/network; auto-maps to a purchase item using UNSPSC, manufacturer name, and manufacturer part ID.", "explanation": ""}, {"term": "Sourcing Priority on a supplier item", "definition": "1 = Primary Supplier, 2+ = Secondary Suppliers, 0 = Unranked — ranks which supplier buyers default to first.", "explanation": ""}, {"term": "Nitrile gloves example — which price should be entered on the Purchase Item itself?", "definition": "The manufacturer's suggested retail price ($10/box) — the purchase item holds the reference/master price, while each supplier's own price lives on their supplier item record.", "explanation": ""}, {"term": "Nitrile gloves example — how do you make Supplier B the preferred source due to a pricing contract?", "definition": "Set Supplier B's gloves to sourcing priority 1.", "explanation": ""}, {"term": "Nitrile gloves example — Supplier C also sells cases of 10 boxes at a different price. How do you configure that?", "definition": "Set up multiple units of measure on Supplier C's order pricing.", "explanation": "A packaging string helps define the UOM conversion, but the actual multi-UOM pricing is set up in Ordering Pricing."}, {"term": "Commodity Code", "definition": "Groups similar goods/services using either a custom structure or an industry-standard taxonomy like UNSPSC or NIGP.", "explanation": "UNSPSC codes follow Segment > Family > Class > Commodity, an eight-digit four-level hierarchy."}, {"term": "Security Configurator (security group)", "definition": "Configures domain and business process security policies tenant-wide, and can assign workers to security groups — but has no approval authority.", "explanation": ""}, {"term": "Security Administrator", "definition": "Manages all security-related info tenant-wide — accounts, password rules, permissions — and generally has approval authority for org/system business processes.", "explanation": ""}, {"term": "Domain Security Policy", "definition": "Governs access to a domain (a collection of related tasks/reports/services) at a high level: View, View and Modify, Get, and Put.", "explanation": "Get/Put govern integration access specifically."}, {"term": "Business Process Security Policy", "definition": "Governs access at a more granular level: Initiate, View, Approve, Rescind, Cancel, Correct, and Delegations.", "explanation": ""}, {"term": "Role-Based Security Group", "definition": "Access tied to a position within one or more organizations — e.g., Controller, Accounting Manager.", "explanation": "Contrast with User-Based, which grants access to a specific person regardless of org (e.g., Report Writer)."}, {"term": "Aggregate vs. Intersection security groups", "definition": "Aggregate: user qualifies by meeting ANY of the included groups' criteria. Intersection: user must meet ALL of the included groups' criteria.", "explanation": ""}, {"term": "View Security for Securable Item (report)", "definition": "Shows which domain a given secured item belongs to.", "explanation": ""}, {"term": "Security Analysis for Action (report)", "definition": "Finds which security group is giving a specific user access to a specific task.", "explanation": ""}, {"term": "Activating security policy changes", "definition": "Edits to a security policy stay in Pending status until run through the Activate Pending Security Policy Changes task — a separate step secured to the Security Activation domain.", "explanation": "This intentionally separates who can EDIT security policy from who can APPROVE/activate it. Adding a user to an existing group with existing permissions doesn't require activation."}, {"term": "Maintain Assignable Roles — field that governs whose picture displays on the org chart", "definition": "Is Leader / Is Supporting.", "explanation": "A worker assigned an 'Is Leader' role displays as the org's leader when 'Include Manager Name' is enabled."}, {"term": "A new role-based security group and assignable role exist, but 'For Security Groups' is empty on the role — how do you fix it?", "definition": "Use Maintain Assignable Roles to link the new role to the new security group.", "explanation": ""}, {"term": "Business Process Type", "definition": "A Workday-delivered automated event you configure via a workflow — e.g., Supplier, Supplier Invoice, Accounting Journal Event.", "explanation": ""}, {"term": "Business Process Definition", "definition": "The specific list of steps and the security groups responsible for completing them, for a given business process type/context.", "explanation": ""}, {"term": "Business Process Target", "definition": "The object the business process affects (e.g., the supplier invoice itself) — the target controls which business process definition Workday uses.", "explanation": ""}, {"term": "Initiation step", "definition": "Always the first step in any business process, defines who can start it, and cannot be removed.", "explanation": ""}, {"term": "What is the first step type in every business process?", "definition": "Initiation.", "explanation": ""}, {"term": "A new company organization hasn't been assigned to a hierarchy yet — what business process definition does it follow?", "definition": "The default definition.", "explanation": "Once assigned to a hierarchy, it can follow that hierarchy's specific definition instead."}, {"term": "'Create Supplier Invoice' and 'Create Journal' are examples of what BP feature?", "definition": "Initiating Actions — the tasks that kick off a business process instance.", "explanation": ""}, {"term": "Approval step", "definition": "Gives a designated approver the chance to approve, send back, or deny the entire business process; approval steps themselves are not editable.", "explanation": ""}, {"term": "Approval Chain step", "definition": "A sequence of approvals starting with an individual and moving up the management chain until an exit condition is met.", "explanation": ""}, {"term": "Condition Rule — Entry Condition", "definition": "Specifies when a step should run; if true the step runs, if false Workday skips it. Every step type can have one except Initiation.", "explanation": ""}, {"term": "Condition Rule — Validation Condition", "definition": "Used on Initiation and Action steps; if any condition is true, the step is blocked from exiting (sends it back).", "explanation": ""}, {"term": "Condition Rule — While Running Condition", "definition": "Only available on an Approval Chain step; evaluates each approver in the chain — if true, routes to that approver, if false, skips to the next.", "explanation": ""}, {"term": "Condition Rule — Exit Condition", "definition": "Only available on Approval Chain or Integration steps; determines when the step should exit (e.g., waiting for a response from an external service on an Integration step).", "explanation": ""}, {"term": "Requisition", "definition": "A request to purchase goods, services, or contingent labor — can be created for yourself or on behalf of another worker.", "explanation": ""}, {"term": "Requisition Sourcing Rules — attribute precedence order", "definition": "Purchase Item > Spend Category > Street Address > Company, from highest to lowest importance when ranking which rule wins.", "explanation": "Workday uses the first matching rule, ranked by how many high-importance attributes it includes — not simply the order rules are listed in."}, {"term": "Ordering method: Search Catalog", "definition": "Search by manufacturer, MPN, GTIN, supplier catalog number, UPC, or UPN, with facets like priority supplier and spend category.", "explanation": ""}, {"term": "Ordering method: Request Non-Catalog Items", "definition": "Used when the item isn't in the catalog — requestor enters what info they have, buyer completes the rest when creating the PO.", "explanation": ""}, {"term": "Ordering method: Connect to Supplier Website (punchout)", "definition": "Connects directly to a supplier's website, lets you shop there, and transfers ('punches out') selected items back into a Workday requisition.", "explanation": ""}, {"term": "A requester gets a one-off quote from a brand-new supplier for custom lab improvements — which ordering method?", "definition": "Request Non-Catalog Items.", "explanation": "Not in any catalog, and it's not a punchout-integrated supplier."}, {"term": "Requisition status: Draft", "definition": "Either manually saved as a draft, or the requisition failed a critical custom validation.", "explanation": ""}, {"term": "Requisition status: Budget Check Failed", "definition": "The requisition failed the company's budget check constraints.", "explanation": ""}, {"term": "Consolidate (requisition sourcing option)", "definition": "Enables sourcing multiple requisitions with a matching supplier, buyer, and ship-to address onto a single PO.", "explanation": ""}, {"term": "Which delivered security group sources requisitions?", "definition": "Buyer.", "explanation": ""}, {"term": "A company wants R&D requisitions to always route to a specific buyer's queue — how?", "definition": "Configure requisition sourcing rules.", "explanation": "Sourcing rules can route based on attributes like requisition type/spend category to determine the resulting buyer."}, {"term": "Purchase Order (PO)", "definition": "The first official offer from buyer to seller — a commercial document indicating type, quantity, and agreed price to control purchasing from external suppliers.", "explanation": "Can be created manually, from a requisition (auto or manual sourcing), or from a supplier contract."}, {"term": "Which delivered roles can create and issue purchase orders?", "definition": "Buyer, Implementer, and Supplier Contract Specialist.", "explanation": ""}, {"term": "Adding new requisition lines to an already-approved PO — what happens?", "definition": "The Purchase Order Event business process restarts; if the lines are issued, the PO's Change Order business process initiates.", "explanation": ""}, {"term": "Purchase Order Acknowledgement (POA)", "definition": "A supplier's confirmation that they received the PO — typically confirms product availability, pricing, UOM, and shipment dates.", "explanation": "Can be recorded manually or loaded via a delivered web service."}, {"term": "POA status: Partially Accepted", "definition": "Sets all lines to Unacknowledged and allows you to select status and edit line elements — used when anything about the original PO changed.", "explanation": "Fully Accept/Reject instead locks the lines as Accepted/Rejected, not editable."}, {"term": "Change Order", "definition": "A revised version of an already-issued PO, used to communicate changes (pricing, quantity, delivery date, etc.) back to the supplier; the original document info is preserved with version numbers.", "explanation": "Can only be performed on a PO with Issued status."}, {"term": "Edit Without Change Order", "definition": "Lets you update non-monetary fields on an approved/issued PO without triggering a full change order or re-approval.", "explanation": "Secured to the Process: Purchase Order Create/Edit domain."}, {"term": "If a PO doesn't appear in the Supplier Backorder Work Area, what's missing?", "definition": "A Purchase Order Acknowledgement.", "explanation": "Backorder tracking relies on a POA sequence generator and the Backorder Event business process being set up."}, {"term": "You need to change quantity and unit pricing on an issued PO line — which action?", "definition": "Create Change Order.", "explanation": "Edit Without Change Order only covers non-monetary fields — pricing/quantity changes need a real change order."}, {"term": "After a change order is approved, what step allows further processing?", "definition": "Issue the purchase order (re-issue it) before receiving/invoicing can continue.", "explanation": "You can only perform receiving against a PO that isn't currently in an in-process (non-issued) state."}, {"term": "Supplier Contract Type option: Scheduled Invoices", "definition": "Automatically creates invoices for scheduled installments defined on the contract.", "explanation": ""}, {"term": "Supplier Contract Type option: Consignment", "definition": "Adds a Consigned Quantity field to the contract's goods lines.", "explanation": ""}, {"term": "Supplier Contract Amendment", "definition": "Processes a change against an approved contract, creating a new version viewable in the Amendments tab — routed through the Supplier Contract Amendment event.", "explanation": ""}, {"term": "What is the primary field that drives functionality and required fields on a supplier contract?", "definition": "Contract Type.", "explanation": ""}, {"term": "A supplier contract has expired but you still need to order against it — what do you do?", "definition": "Create an amendment (to update the end date) — you can't transact against a contract past its end date otherwise.", "explanation": ""}, {"term": "Which delivered security group can create supplier contracts?", "definition": "Supplier Contract Specialist.", "explanation": ""}, {"term": "Create Receipt — sources you can receive against", "definition": "Purchase Order, Supplier Contract, Alternate Supplier Contract, or Advance Ship Notice (ASN).", "explanation": "Most commonly, receiving happens against the Purchase Order."}, {"term": "Fully Receive option", "definition": "Auto-populates all receipt lines with the remaining open balance from the PO — available at the header level or per line.", "explanation": ""}, {"term": "Situations where you CANNOT create a receipt adjustment", "definition": "Receipt lines with splits, amortized lines, returned lines, PO lines closed or closed for receiving, and contingent worker/project-based/supplier-contract-only receipts.", "explanation": ""}, {"term": "You created a receipt, but the PO doesn't show up in Create Receipt — likely cause?", "definition": "The purchase order isn't issued yet.", "explanation": "You can only receive against an issued PO."}, {"term": "You need to receive new items, but someone already created a receipt today against a different line on the same PO — what do you do?", "definition": "Create a receipt against the new line only — separate lines on the same PO can each have their own receipt.", "explanation": ""}, {"term": "Return to Supplier (business process)", "definition": "Handles returning goods that arrived in error, damaged, or expired — initiated via the Create Return task, secured to specific roles like Buyer and Business Asset Specialist.", "explanation": ""}, {"term": "All test tubes in a received box are broken and the supplier agrees to a refund — what task handles this?", "definition": "Create Return.", "explanation": ""}, {"term": "Maintain Return Reasons", "definition": "Lets you define return reasons and specify which ones should automatically generate a Supplier Invoice Adjustment.", "explanation": "The Invoice Adjustment Reason on that return reason must have Payable Use selected."}, {"term": "Match Exception", "definition": "A warning indicator that an invoice and purchase order (or contract) conflict — it prevents payment until resolved.", "explanation": ""}, {"term": "Three-way match", "definition": "Compares PO/Supplier Contract, Receipt, and Invoice — the most common matching method, since it relies on actually receiving the goods.", "explanation": "Shorthand: PO/SC – R – I"}, {"term": "Two-way match", "definition": "Compares only the PO/Supplier Contract and Invoice — used when there's nothing to receive, or receipt happened before the PO was cut (bill only).", "explanation": "Shorthand: PO/SC – I"}, {"term": "Four-way match", "definition": "Compares PO, Receipt, Inspection, and Invoice — used for high-value items requiring inspection before receipt.", "explanation": "The inspection is configured as an extra step on the Receipt business process."}, {"term": "Is matching a scheduled batch job?", "definition": "No — matching is a real-time process triggered by events like submitting a supplier invoice, a receipt, a change order, or a contract amendment.", "explanation": ""}, {"term": "At what point in the process does Workday first evaluate matching?", "definition": "Submission of an invoice.", "explanation": "Matching isn't evaluated at requisition, PO submission, or PO issue — it kicks in once an invoice comes in."}, {"term": "Match Condition Rule vs. Match Exception Reason vs. Match Rule vs. Match Rule Set", "definition": "Condition Rule: defines the tolerance logic. Exception Reason: the plain-language text shown to the user. Match Rule: ties a condition rule to an exception reason. Match Rule Set: assigns match rules to a company (a company can only use one set at a time).", "explanation": "If a company isn't assigned to any match rule set, its invoices won't go through matching at all."}, {"term": "Where do you define what fields Workday evaluates for matching?", "definition": "Match Condition Rules.", "explanation": ""}, {"term": "Match Override", "definition": "Lets a user bypass a match exception through an approved override request, routed through the Supplier Accounts Match Exception Override Event.", "explanation": "Common reasons: incorrect billing, or an expected credit memo."}, {"term": "Which situation most likely leads to a legitimate match exception override (rather than fixing the source document)?", "definition": "A large currency exchange rate difference between the PO date and the invoice date.", "explanation": "A typo, a missing receipt, or a pricing change are better resolved by correcting the actual document, not overriding the exception."}, {"term": "Ways to create a Supplier Invoice", "definition": "Without a PO, from a PO, from receipts, from timesheets, from task logs, or manually.", "explanation": ""}, {"term": "Supplier Invoice Adjustment", "definition": "Commonly called a credit memo; can increase or decrease your liability to a supplier. It doesn't have to reference an existing invoice, but can be linked to one.", "explanation": ""}, {"term": "Recurring Supplier Invoice", "definition": "Models regular payments like rent/lease agreements with configurable intervals — but setting up the template alone does NOT generate an invoice.", "explanation": "It's a two-part process: set up the template, then create an invoice referencing it (manually or via scheduler)."}, {"term": "Bank Routing Rule", "definition": "Controls which bank account the settlement process uses for a given payment; Workday evaluates conditions top-down and uses the first match, or the default account if none match.", "explanation": "Applies only to standard bank accounts — not petty cash."}, {"term": "What determines which bank account is used during a settlement run?", "definition": "The bank routing rule for the company.", "explanation": ""}, {"term": "Settlement Run", "definition": "Processes a batch of unpaid items/pending payments across multiple sources (supplier invoices, customer refunds, expense reports, intercompany, payroll, ad hoc cash) as of a run date.", "explanation": "The settlement run itself doesn't issue the payment — you must separately issue the check or electronic transfer file."}, {"term": "Settlement Run Date", "definition": "Only pulls in unpaid items whose dates fall before this date, and is used as the payment date on checks/advices for the items selected.", "explanation": "For electronic payments, the actual payment date is the date you process the run."}, {"term": "Which security group can settle both supplier invoices and customer refunds in the same run?", "definition": "The Settlement Specialist.", "explanation": ""}, {"term": "During a settlement run, what determines which transactions can be processed through a given bank account?", "definition": "The primary account usages set on the bank account.", "explanation": ""}, {"term": "Maintain Procurement Reasons", "definition": "Defines the justifications available when closing procurement documents.", "explanation": ""}, {"term": "All goods received on one PO line, but no invoice yet — what action should you take?", "definition": "Close the lines for receiving (not the whole PO or the whole contract) — you can still expect the invoice.", "explanation": ""}, {"term": "Mass Close Procurement Documents", "definition": "Marks multiple purchase orders as complete/closed at once.", "explanation": ""}, {"term": "Buyer Hub", "definition": "A centralized worklet with cards/tasks/reports for POs, POAs, requisitions, supplier contracts, and supplier invoices — not available on the Workday mobile app.", "explanation": ""}, {"term": "Which delivered reporting tool manages requisitions and purchase orders?", "definition": "Buyer Hub.", "explanation": ""}, {"term": "Which report directly locates an issued order for goods and services?", "definition": "Find Purchase Orders.", "explanation": ""}, {"term": "Which report type allows customization?", "definition": "Report Writer.", "explanation": "Xpresso and Workday Delivered/Standard reports aren't the customizable type being tested here."}, {"term": "Discovery Boards", "definition": "Ad hoc reporting/analysis dashboards offering Agility (real-time pivoting), Insight (drag-and-drop drill-down), and Collaboration (shared editing/viewing under one security model).", "explanation": ""}, {"term": "Three-way matching relationship recap", "definition": "PO/Supplier Contract, Receipt, and Invoice must all agree before payment is released — this is why receiving goods matters even when a PO already exists.", "explanation": ""}, {"term": "Cost center manager scenario: invoice approval shows no approver, but the cost center hierarchy HAS a manager and the invoice HAS a cost center worktag on each line — what's wrong?", "definition": "You don't have the correct security to view the business process — the approver may exist but you may lack visibility into the routing.", "explanation": "This is a process-of-elimination question: since both the hierarchy manager and the worktag are confirmed present, the remaining explanation is a security/visibility issue."}, {"term": "Same scenario, but this time the cost centers on the invoice ARE assigned to a hierarchy — what's the more specific issue?", "definition": "The cost center hierarchy itself doesn't have a cost center manager assigned.", "explanation": "Even with cost centers properly tied to a hierarchy, if no manager role is assigned at the hierarchy level, there's no one for the approval step to route to."}, {"term": "Requiring a cost center worktag on ALL supplier invoices, tenant-wide — which task?", "definition": "Maintain Worktag Usage.", "explanation": "Tenant-wide worktag requirements belong in Worktag Usage; single-company-only requirements belong in Custom Validations."}, {"term": "Preventing users from including Revenue Category worktags on supplier invoices — which task?", "definition": "Maintain Worktag Usage.", "explanation": "Controlling which worktags are even allowed/available on a transaction type is a Worktag Usage function."}, {"term": "Requiring a Line of Business worktag on supplier invoices for ONE specific company only — which task?", "definition": "Maintain Custom Validations.", "explanation": "Company-specific requirements (not tenant-wide) always point to Custom Validations."}, {"term": "Which procurement option is configured at the TENANT level (not per-company)?", "definition": "Enable Multi-Company.", "explanation": "Default Ship-To Contact, Default Bill-To Contact, and similar defaults are configured per-company via Edit Company Procurement Options."}, {"term": "Hiding the 'high priority' checkbox field on requisitions — which task?", "definition": "Configure Optional Fields.", "explanation": ""}, {"term": "Which document informs the supplier what your company wants to buy?", "definition": "Purchase order.", "explanation": "A requisition is the internal request; the PO is what actually goes to the supplier."}];

let fbDb = null;
let fbReady = false;
const fbAuthReady = (async () => {
  try {
    firebase.initializeApp(firebaseConfig);
    fbDb = firebase.firestore();
    await firebase.auth().signInAnonymously();
    fbReady = true;
  } catch (e) {
    console.error("Firebase unavailable — falling back to local-only storage.", e);
    fbReady = false;
  }
})();

// Best-effort helpers: every call is wrapped so a Firebase hiccup (offline,
// rules issue, etc.) never breaks the app — it just quietly stays local-only.
async function fbPull(collection){
  await fbAuthReady;
  if (!fbReady || !fbDb) return null;
  try {
    const snap = await fbDb.collection(collection).get();
    return snap.docs.map(d => d.data());
  } catch (e) { console.error("fbPull failed:", collection, e); return null; }
}
async function fbPullDoc(collection, id){
  await fbAuthReady;
  if (!fbReady || !fbDb) return null;
  try {
    const doc = await fbDb.collection(collection).doc(id).get();
    return doc.exists ? doc.data() : null;
  } catch (e) { console.error("fbPullDoc failed:", collection, id, e); return null; }
}
async function fbPush(collection, id, data){
  await fbAuthReady;
  if (!fbReady || !fbDb) return;
  try { await fbDb.collection(collection).doc(String(id)).set(data); }
  catch (e) { console.error("fbPush failed:", collection, id, e); }
}
async function fbRemove(collection, id){
  await fbAuthReady;
  if (!fbReady || !fbDb) return;
  try { await fbDb.collection(collection).doc(String(id)).delete(); }
  catch (e) { console.error("fbRemove failed:", collection, id, e); }
}

async function fetchAllForBackup(){
  const [cloudSets, cloudEmployees, cloudCerts, cloudFeedback] = await Promise.all([
    fbPull("sets"), fbPull("employees"), fbPull("certificates"), fbPull("feedback"),
  ]);
  let progress = {};
  try {
    await fbAuthReady;
    if (fbReady && fbDb) {
      const snap = await fbDb.collection("progress").get();
      snap.docs.forEach((d) => { progress[d.id] = d.data(); });
    }
  } catch (e) { console.error("progress backup fetch failed:", e); }
  return {
    exportedAt: new Date().toISOString(),
    sets: cloudSets !== null ? cloudSets : state.sets,
    employees: cloudEmployees !== null ? cloudEmployees : loadEmployees(),
    certificates: cloudCerts !== null ? cloudCerts : loadCertificates(),
    feedback: cloudFeedback !== null ? cloudFeedback : loadFeedback(),
    progress,
  };
}

function downloadJson(filename, dataObj){
  const blob = new Blob([JSON.stringify(dataObj, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// --- Harder multiple-choice distractors ---
// Instead of picking 3 random other cards, score every candidate by how much
// its definition/term overlaps with the correct card's — then pick from that
// harder pool (with some shuffling for variety across rounds), so the wrong
// options actually sound plausible instead of being easy to eliminate.
const MC_STOPWORDS = new Set(["that","this","with","from","have","which","their","there","these","those","about","would","could","should","where","when","what","into","only","also","such","than","then","they","them","your","will","been","being","some","more","most","each","other","must","used","uses","using","allows","allow","enables","enable","provides","provide"]);
function mcTokenize(text){
  return (text || "").toLowerCase().replace(/[^a-z0-9\s]/g, "").split(/\s+/).filter(w => w.length > 3 && !MC_STOPWORDS.has(w));
}
function mcSimilarity(defA, defB){
  const a = new Set(mcTokenize(defA)), b = new Set(mcTokenize(defB));
  if (a.size === 0 || b.size === 0) return 0;
  let overlap = 0;
  a.forEach(w => { if (b.has(w)) overlap++; });
  return overlap / Math.sqrt(a.size * b.size);
}
function pickHardDistractors(card, allCards, count){
  const candidates = allCards.filter(x => x.id !== card.id);
  if (candidates.length <= count) return shuffle(candidates);
  const scored = candidates.map(c => ({
    c,
    score: mcSimilarity(card.definition, c.definition) + mcSimilarity(card.term, c.term) * 0.5,
  }));
  scored.sort((a, b) => b.score - a.score);
  const poolSize = Math.min(scored.length, Math.max(count * 2, 6)); // a slightly wider "hard" pool for round-to-round variety
  const pool = scored.slice(0, poolSize).map(s => s.c);
  return shuffle(pool).slice(0, count);
}

// Combines any employees that share the same name (case-insensitive) into one
// profile — keeps the oldest one, sums/merges progress, reassigns certs, and
// removes the extras both locally and in Firestore.
async function mergeDuplicateEmployees(){
  await syncEmployeesFromCloud();
  const employees = loadEmployees();
  const groups = {};
  employees.forEach(e => {
    const key = e.name.trim().toLowerCase();
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });

  const progressStore = loadProgress();
  const certificates = loadCertificates();
  const survivors = [];
  const removedIds = [];
  const changedCertIds = [];

  Object.values(groups).forEach(group => {
    if (group.length === 1) { survivors.push(group[0]); return; }
    group.sort((a,b) => (a.createdAt || 0) - (b.createdAt || 0));
    const primary = group[0];
    survivors.push(primary);
    const primaryProgress = getEmployeeProgress(progressStore, primary.id);
    for (let i = 1; i < group.length; i++) {
      const dup = group[i];
      const dupProgress = progressStore[dup.id];
      if (dupProgress) {
        primaryProgress.totalTimeMs += dupProgress.totalTimeMs || 0;
        primaryProgress.learnCorrect += dupProgress.learnCorrect || 0;
        primaryProgress.learnTotal += dupProgress.learnTotal || 0;
        Object.keys(dupProgress.mastered || {}).forEach(setId => {
          if (!primaryProgress.mastered[setId]) primaryProgress.mastered[setId] = [];
          (dupProgress.mastered[setId] || []).forEach(cardId => {
            if (!primaryProgress.mastered[setId].includes(cardId)) primaryProgress.mastered[setId].push(cardId);
          });
        });
        delete progressStore[dup.id];
        fbRemove("progress", dup.id);
      }
      certificates.forEach(c => {
        if (c.employeeId === dup.id) { c.employeeId = primary.id; c.employeeName = primary.name; changedCertIds.push(c.id); }
      });
      removedIds.push(dup.id);
    }
    fbPush("progress", primary.id, primaryProgress);
  });

  if (removedIds.length === 0) { showToast("No duplicate profiles found."); return; }

  saveEmployees(survivors);
  saveProgress(progressStore);
  saveCertificates(certificates);
  removedIds.forEach(id => fbRemove("employees", id));
  certificates.filter(c => changedCertIds.includes(c.id)).forEach(c => fbPush("certificates", c.id, c));

  if (removedIds.includes(state.currentEmployeeId)) {
    const myOldName = employees.find(e => e.id === state.currentEmployeeId).name.trim().toLowerCase();
    const primary = groups[myOldName][0];
    state.currentEmployeeId = primary.id;
    try { sessionStorage.setItem(CURRENT_EMPLOYEE_KEY, primary.id); } catch(e) {}
  }

  showToast(`Merged ${removedIds.length} duplicate profile(s).`);
  render();
}

// Resizes + recompresses an image client-side before it ever touches storage,
// since raw phone photos would blow through localStorage's ~5-10MB cap fast.
function compressImageFile(file, maxDim, quality){
  maxDim = maxDim || 480; quality = quality || 0.72;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h && w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
        else if (h >= w && h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = () => reject(new Error("Couldn't read that image."));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error("Couldn't read that file."));
    reader.readAsDataURL(file);
  });
}

If the document already contains a list of questions and answers, use those directly rather than inventing new ones:
- "term" = the actual question wording itself, with any label or number stripped off (e.g. from "Question 3: What is a Supervisory Organization?" the term is "What is a Supervisory Organization?" — never just "Question 3").
- "definition" = ONLY the short correct answer itself, with no "Correct Answer —" prefix, no answer-choice letter (A/B/C/D), and no extra reasoning folded in. Just the answer, plain.

// Loads the mammoth.js library on demand (only when someone actually
// uploads a .docx) so the app has zero extra network cost otherwise.
let mammothLoadPromise = null;
function loadMammoth(){
  if (window.mammoth) return Promise.resolve();
  if (mammothLoadPromise) return mammothLoadPromise;
  mammothLoadPromise = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js";
    s.onload = () => resolve();
    s.onerror = () => reject(new Error("Couldn't load the document reader — check your network connection."));
    document.head.appendChild(s);
  });
  return mammothLoadPromise;
}

function parseImportedCards(raw){
  let data;
  try { data = JSON.parse(raw); }
  catch(e) { return { error: "That doesn't look like valid JSON. Make sure you copied the full response and nothing else." }; }
  let cards, name, description;
  if (Array.isArray(data)) {
    cards = data;
  } else if (data && Array.isArray(data.cards)) {
    cards = data.cards; name = data.name; description = data.description;
  } else {
    return { error: "Expected a JSON array of cards, or an object with a \"cards\" array." };
  }
  const cleaned = cards
    .map(c => ({
      term: (c && (c.term || c.Term) ? String(c.term || c.Term) : "").trim(),
      definition: (c && (c.definition || c.Definition) ? String(c.definition || c.Definition) : "").trim(),
      explanation: (c && (c.explanation || c.Explanation) ? String(c.explanation || c.Explanation) : "").trim(),
    }))
    .filter(c => c.term && c.definition);
  if (cleaned.length === 0) return { error: "No valid term/definition pairs were found in that JSON." };
  return { cards: cleaned, name, description };
}

let guideTimeoutId = null;
function clearGuideTimer(){ if (guideTimeoutId) { clearTimeout(guideTimeoutId); guideTimeoutId = null; } }
function scheduleGuideAdvance(){
  clearGuideTimer();
  if (state.view !== "onboarding-guide") return;
  const slide = GUIDE_SLIDES[state.guideSlideIndex];
  if (!slide) return;
  guideTimeoutId = setTimeout(() => {
    if (state.view !== "onboarding-guide") return;
    if (document.querySelector(".modal-overlay, .sidebar-overlay")) { scheduleGuideAdvance(); return; }
    if (state.guideSlideIndex >= GUIDE_SLIDES.length - 1) {
      finishGuide();
    } else {
      state.guideSlideIndex++;
      render();
    }
  }, slide.duration);
}
function finishGuide(){
  clearGuideTimer();
  const list = loadEmployees();
  const emp = list.find(e => e.id === state.currentEmployeeId);
  if (emp) {
    emp.hasSeenGuide = true;
    saveEmployees(list);
    fbPush("employees", emp.id, emp);
  }
  if (isMaintenanceOn() && !isAdminUser()) { showMaintenanceScreen(); return; }
  state.view = "dashboard";
  render();
}

const ADMIN_EMPLOYEE_NAME = "logan keller"; // lowercase, trimmed — matched against the checked-in name
const AVATAR_OPTIONS = ["🦊","🐼","🐸","🦁","🐵","🐨","🦄","🐶","🐱","🦉","🐧","🐙","🐝","🦖","🐢","🐯","🐻","🦋","🐳","🐷"];
function employeeAvatar(emp){ return (emp && emp.avatar) || "🙂"; }
const MAINTENANCE_KEY = "wd_maintenance_v1";

function isMaintenanceOn(){
  try { return localStorage.getItem(MAINTENANCE_KEY) === "1"; } catch(e) { return false; }
}
function setMaintenance(on){
  try { localStorage.setItem(MAINTENANCE_KEY, on ? "1" : "0"); } catch(e) {}
}

function isAdminUser(){
  if (!state.currentEmployeeId) return false;
  const emp = loadEmployees().find(e => e.id === state.currentEmployeeId);
  return !!emp && emp.name.trim().toLowerCase() === ADMIN_EMPLOYEE_NAME;
}

function viewLeaderboard(){
  const employees = loadEmployees();
  const me = employees.find(e => e.id === state.currentEmployeeId);
  const tab = state.leaderboardTab || "ranking";

  const rows = employees.map(e => ({
    id: e.id, name: e.name, avatar: employeeAvatar(e),
    mastery: overallMasteryPct(e.id, state.sets),
    accuracy: accuracyPct(e.id),
    time: (loadProgress()[e.id] || {}).totalTimeMs || 0,
  })).filter(r => r.mastery > 0 || r.accuracy !== null || r.time > 0);
  const sortKey = state.leaderboardSort;
  rows.sort((a,b) => {
    if (sortKey === "accuracy") return (b.accuracy||0) - (a.accuracy||0);
    if (sortKey === "time") return b.time - a.time;
    return b.mastery - a.mastery;
  });

  const tabs = `
    <div style="display:flex;gap:6px;margin-bottom:20px;">
      <button class="btn-ghost" data-action="leaderboard-tab" data-tab="ranking" style="font-size:13px;padding:7px 14px;border-radius:999px;border:1px solid ${tab==="ranking"?"var(--blue)":"var(--border)"};color:${tab==="ranking"?"var(--blue)":"var(--gray)"};">${ICONS.trophy} Leaderboard</button>
      <button class="btn-ghost" data-action="leaderboard-tab" data-tab="mine" style="font-size:13px;padding:7px 14px;border-radius:999px;border:1px solid ${tab==="mine"?"var(--blue)":"var(--border)"};color:${tab==="mine"?"var(--blue)":"var(--gray)"};">My progress</button>
    </div>`;

  if (tab === "mine") {
    if (!me) return `<button class="btn-ghost" data-action="go-home" style="margin-bottom:16px;">${ICONS.back} Back</button>${tabs}<p style="color:var(--gray);font-size:13px;">Check in with your name first to see your progress.</p>`;
    const myMastery = overallMasteryPct(me.id, state.sets);
    const myAccuracy = accuracyPct(me.id);
    const myTime = (loadProgress()[me.id] || {}).totalTimeMs || 0;
    return `
      <button class="btn-ghost" data-action="go-home" style="margin-bottom:16px;">${ICONS.back} Back</button>
      ${tabs}
      <h2 class="wd-h" style="font-size:20px;margin:0 0 16px;display:flex;align-items:center;gap:10px;"><span style="font-size:24px;">${employeeAvatar(me)}</span> ${esc(me.name)}'s progress</h2>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:26px;">
        <div class="wd-card" style="padding:18px;text-align:center;">
          <div class="wd-h" style="font-size:26px;color:var(--orange);">${myMastery}%</div>
          <div style="font-size:12px;color:var(--gray);">Overall mastery</div>
        </div>
        <div class="wd-card" style="padding:18px;text-align:center;">
          <div class="wd-h" style="font-size:26px;color:var(--blue);">${myAccuracy===null?"—":myAccuracy+"%"}</div>
          <div style="font-size:12px;color:var(--gray);">Learn accuracy</div>
        </div>
        <div class="wd-card" style="padding:18px;text-align:center;">
          <div class="wd-h" style="font-size:26px;color:var(--green);">${formatDuration(myTime)}</div>
          <div style="font-size:12px;color:var(--gray);">Time studied</div>
        </div>
      </div>
      <h3 class="wd-h" style="font-size:15px;margin:0 0 10px;">By set — what to focus on next</h3>
      ${state.sets.length === 0 ? `<p style="font-size:13px;color:var(--gray);">No sets yet.</p>` : `
        <div style="display:grid;gap:10px;">
          ${state.sets.map(s => {
            const store = loadProgress();
            const p = getEmployeeProgress(store, me.id);
            const masteredCount = (p.mastered[s.id] || []).length;
            const pct = s.cards.length ? Math.round((masteredCount/s.cards.length)*100) : 0;
            return `
              <div class="wd-card" style="padding:14px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                  <span style="font-size:13.5px;color:var(--blueDark);font-weight:600;">${esc(s.name)}</span>
                  <span style="font-size:12px;color:var(--gray);">${masteredCount}/${s.cards.length} mastered</span>
                </div>
                <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
              </div>`;
          }).join("")}
        </div>
      `}
    `;
  }

  return `
    <button class="btn-ghost" data-action="go-home" style="margin-bottom:16px;">${ICONS.back} Back</button>
    ${tabs}
    <h2 class="wd-h" style="font-size:20px;margin:0 0 4px;">Leaderboard</h2>
    <p style="font-size:13px;color:var(--gray);margin:0 0 18px;">Ranked across your whole team.</p>
    <div style="display:flex;gap:6px;margin-bottom:14px;">
      ${[["mastery","Mastery"],["accuracy","Accuracy"],["time","Time studied"]].map(([key,label]) => `
        <button class="btn-ghost" data-action="leaderboard-sort" data-sort="${key}" style="font-size:12px;padding:5px 11px;border-radius:999px;border:1px solid ${sortKey===key?"var(--blue)":"var(--border)"};color:${sortKey===key?"var(--blue)":"var(--gray)"};">${label}</button>
      `).join("")}
    </div>
    ${rows.length === 0 ? `<p style="font-size:13px;color:var(--gray);">No one's checked in on this device yet.</p>` : `
      <div style="display:grid;gap:8px;">
        ${rows.map((r,i) => `
          <div class="wd-card" style="padding:14px 16px;display:flex;align-items:center;gap:14px;${r.id===state.currentEmployeeId?"border-color:var(--orange);":""}">
            <span class="wd-h" style="font-size:16px;color:var(--gray);width:24px;">${i+1}</span>
            <span style="font-size:20px;">${r.avatar}</span>
            <span style="flex:1;font-size:14px;color:var(--blueDark);font-weight:600;">${esc(r.name)}${r.id===state.currentEmployeeId?" (you)":""}</span>
            <span style="font-size:13px;color:var(--orange);width:52px;text-align:right;">${r.mastery}%</span>
            <span style="font-size:13px;color:var(--blue);width:52px;text-align:right;">${r.accuracy===null?"—":r.accuracy+"%"}</span>
            <span style="font-size:13px;color:var(--green);width:70px;text-align:right;">${formatDuration(r.time)}</span>
          </div>
        `).join("")}
      </div>
    `}
  `;
}

function logoMark(size){
  const gid = "lg" + Math.round(Math.random()*999999);
  return `<svg width="${size}" height="${size}" viewBox="0 0 40 40">
    <defs><linearGradient id="${gid}" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FDBA58"/><stop offset="100%" stop-color="#F4990B"/>
    </linearGradient></defs>
    <circle cx="20" cy="20" r="18" fill="#12283F"/>
    <path d="M 9 22 A 12 12 0 0 1 31 22" fill="none" stroke="url(#${gid})" stroke-width="4" stroke-linecap="round"/>
  </svg>`;
}
function progressArc(pct, size, stroke){
  size = size||44; stroke = stroke||5;
  const r=(size-stroke)/2, c=2*Math.PI*r, offset=c*(1-pct/100);
  const gid = "arc"+Math.round(Math.random()*99999);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <defs><linearGradient id="${gid}" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F4990B"/><stop offset="100%" stop-color="#FDBA58"/>
    </linearGradient></defs>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#E3E8EF" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#${gid})" stroke-width="${stroke}" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .5s ease"/>
    <text x="50%" y="50%" text-anchor="middle" dy="0.35em" font-size="${size*0.28}" font-weight="700" fill="#12283F" font-family="Sora,sans-serif">${Math.round(pct)}</text>
  </svg>`;
}

function renderToastOnly(){
  const el = document.getElementById("toast-slot");

}

function getActiveSet(){
  return state.sets.find(s => s.id === state.activeSetId) || null;
}

function persistActiveSetEdit(setObj){
  const idx = state.sets.findIndex(s => s.id === setObj.id);
  const clean = {...setObj, updatedAt: Date.now()};
  if (idx >= 0) state.sets[idx] = clean; else state.sets.push(clean);
  saveSets(state.sets);
  fbPush("sets", clean.id, clean);
  showToast("Saved — syncing with your team.");
}

function deleteSet(id){
  state.sets = state.sets.filter(s => s.id !== id);
  saveSets(state.sets);
  fbRemove("sets", id);
  showToast("Set deleted.");
  render();
}

/* ---------------- Learn ---------------- */
function buildLearnQueue(cards, employeeId, setId){
  let weak = cards, strong = [];
  if (employeeId && setId) {
    const store = loadProgress();
    const p = store[employeeId];
    const masteredIds = (p && p.mastered && p.mastered[setId]) || [];
    weak = cards.filter(c => !masteredIds.includes(c.id));
    strong = cards.filter(c => masteredIds.includes(c.id));
  }
  const ordered = [...shuffle(weak), ...shuffle(strong)]; // not-yet-mastered cards surface first
  return ordered.map(c => {
    const others = pickHardDistractors(c, cards, 3);
    return { card:c, options: shuffle([c, ...others]) };
  });
}

/* ---------------- Match ---------------- */
function buildMatchTiles(cards){
  const chosen = shuffle(cards).slice(0, Math.min(8, cards.length));
  const tiles = [];
  chosen.forEach(c => {
    tiles.push({key:c.id+"-t", cardId:c.id, text:c.term, matched:false});
    tiles.push({key:c.id+"-d", cardId:c.id, text:c.definition, matched:false});
  });
  return shuffle(tiles);
}
function buildTestQueue(cards, count){
  const chosen = shuffle(cards).slice(0, count);
  return chosen.map(c => {
    const others = pickHardDistractors(c, cards, 3);
    return { card: c, options: shuffle([c, ...others]) };
  });
}

function viewMatch(){
  const s = getActiveSet();
  if (!s) { state.view="dashboard"; return viewDashboard(); }
  if (!state.session || state.session.mode !== "match") {
    state.session = { mode:"match", tiles: buildMatchTiles(s.cards), selected:[], wrong:[], seconds:0, done:false, timer:null };
    state.session.timer = setInterval(() => {
      if (state.session && !state.session.done) { state.session.seconds++; tickSeconds(); }
    }, 1000);
  }
  const ses = state.session;
  if (ses.done) {
    return summaryScreen("Matched!", [{label:"Time", value: ses.seconds+"s", color:"var(--orange)"}], [], true);
  }
  return `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;">
      <button class="btn-ghost" data-action="exit-mode">${ICONS.back} Exit</button>
      <div style="flex:1;"></div>
      <span id="match-timer" style="font-size:13px;color:var(--gray);">${ses.seconds}s</span>
    </div>
    <div class="match-grid">
      ${ses.tiles.map(t => {
        if (t.matched) return `<div class="match-tile hidden"></div>`;
        const isSel = ses.selected.includes(t.key);
        const isWrong = ses.wrong.includes(t.key);
        let style = "";
        if (isWrong) style = "border-color:var(--red);background:#FBEAE8;";
        else if (isSel) style = "border-color:var(--orange);background:#FFF6E9;";
        return `<button class="wd-card match-tile" style="${style}" data-action="match-pick" data-key="${t.key}">${esc(t.text)}</button>`;
      }).join("")}
    </div>
  `;
}
function tickSeconds(){
  const el = document.getElementById("match-timer");
  if (el && state.session) el.textContent = state.session.seconds + "s";
}

  return `

/* ---------------- Event binding ---------------- */
function bindEvents(){
  const root = document.getElementById("root");

  // editor live input binding
  const nameInput = document.getElementById("set-name");
  const descInput = document.getElementById("set-desc");
  if (nameInput) nameInput.addEventListener("input", e => { state.editorDraft.name = e.target.value; });
  if (descInput) descInput.addEventListener("input", e => { state.editorDraft.description = e.target.value; });
  const folderSelect = document.getElementById("set-folder");
  if (folderSelect) folderSelect.addEventListener("change", e => { state.editorDraft.folder = e.target.value || null; });
  const passInput = document.getElementById("admin-passcode-input");
  if (passInput) passInput.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); handleAction("submit-admin-passcode"); }
  });
  const testTimerToggle = document.getElementById("test-timer-toggle");
  if (testTimerToggle) testTimerToggle.addEventListener("change", e => {
    const wrap = document.getElementById("test-timer-minutes-wrap");
    if (wrap) wrap.style.display = e.target.checked ? "block" : "none";
  });
  const importFileInput = document.getElementById("import-file-input");
  if (importFileInput) importFileInput.addEventListener("change", e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const ta = document.getElementById("import-json");
      if (ta) ta.value = reader.result;
    };
    reader.readAsText(file);
  });
  const certPhotoInput = document.getElementById("cert-photo-input");
  if (certPhotoInput) certPhotoInput.addEventListener("change", async e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    state.certError = null;
    try {
      state.certPhotoDataUrl = await compressImageFile(file);
    } catch(err) {
      state.certError = err && err.message ? err.message : "Couldn't read that photo.";
    }
    render();
  });
  const extractInput = document.getElementById("import-extract-input");
  if (extractInput) extractInput.addEventListener("change", async e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    state.extractedText = "";
    state.extractStatus = "Reading " + file.name + "...";
    render();
    try {
      if (/\.docx$/i.test(file.name)) {
        await loadMammoth();
        const arrayBuffer = await file.arrayBuffer();
        const result = await window.mammoth.extractRawText({ arrayBuffer });
        state.extractedText = (result.value || "").trim();
      } else {
        state.extractedText = (await file.text()).trim();
      }
      state.extractStatus = state.extractedText
        ? `Extracted ${state.extractedText.length.toLocaleString()} characters from ${file.name}.`
        : `Couldn't find any text in ${file.name}.`;
    } catch (err) {
      state.extractStatus = err && err.message ? err.message : "Couldn't read that file.";
    }
    render();
  });
  const extractedTextEl = document.getElementById("extracted-text");
  if (extractedTextEl) extractedTextEl.value = state.extractedText;
  root.querySelectorAll("[data-field]").forEach(inp => {
    inp.addEventListener("input", e => {
      const cardId = inp.getAttribute("data-card-id");
      const field = inp.getAttribute("data-field");
      const card = state.editorDraft.cards.find(c => c.id === cardId);
      if (card) card[field] = e.target.value;
    });
  });
}

    case "submit-admin-passcode": {

    case "pin-select-employee":

    case "pin-back":

    case "pin-start-register":
      state.pinGateRegistering = true; state.pinGateError = null; render(); return;
    case "pin-submit": {
      const inp = document.getElementById("pin-enter-input");
      const pin = inp ? inp.value.trim() : "";
      const employees = loadEmployees();
      const emp = employees.find(e => e.id === state.pinGateSelectedId);
      if (!emp) { state.pinGateError = "Something went wrong — try again."; render(); return; }
      const hash = await sha256Hex(emp.name.toLowerCase() + "|" + pin);
      if (hash === emp.pinHash) {
        if (emp.suspended) { state.pinGateError = "This profile has been suspended — contact your admin."; render(); return; }
        state.currentEmployeeId = emp.id;
        try { sessionStorage.setItem(CURRENT_EMPLOYEE_KEY, emp.id); } catch(e) {}
        state.pinGateSelectedId = null; state.pinGateError = null;
        if (isMaintenanceOn() && !isAdminUser()) { showMaintenanceScreen(); return; }
        state.guideSlideIndex = 0;
        state.view = emp.hasSeenGuide === false ? "onboarding-guide" : "dashboard";

      } else {
        state.pinGateError = "Incorrect PIN.";
        render();
      }
