<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>StudyDay — Workday HCM Study</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap');
  :root{
    --blue:#2C69B6; --blueDark:#12283F; --orange:#F4990B; --amber:#FDBA58;
    --bg:#F7F9FC; --surface:#FFFFFF; --gray:#6B7785; --border:#E3E8EF; --green:#1E9E6B; --red:#D0483F;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:'Inter',Arial,sans-serif;color:var(--blueDark);}
  h1,h2,h3,.wd-h{font-family:'Sora','Segoe UI',sans-serif;color:var(--blueDark);}
  button{font-family:inherit;}
  .wd-header{background:var(--surface);border-bottom:1px solid var(--border);}
  .wd-header-inner{max-width:1600px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
  .logo-btn{display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;}
  main{max-width:1600px;margin:0 auto;padding:28px 20px 80px;}
  .btn-primary{background:linear-gradient(135deg,var(--orange),var(--amber));color:var(--blueDark);font-weight:700;border:none;border-radius:10px;padding:10px 18px;cursor:pointer;font-size:14px;transition:transform .15s,box-shadow .15s;}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(244,153,11,.35);}
  .btn-primary:disabled{opacity:.5;cursor:default;transform:none;box-shadow:none;}
  .btn-secondary{background:var(--surface);color:var(--blue);font-weight:600;border:1.5px solid var(--blue);border-radius:10px;padding:9px 16px;cursor:pointer;font-size:14px;}
  .btn-secondary:hover{background:#EEF4FC;}
  .btn-danger{background:var(--red);color:#fff;border:none;border-radius:10px;padding:9px 16px;cursor:pointer;font-weight:700;font-size:14px;}
  .btn-ghost{background:transparent;color:var(--gray);border:none;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;gap:6px;padding:6px;}
  .btn-ghost:hover{color:var(--blueDark);}
  .wd-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;transition:box-shadow .15s,transform .15s;}
  .wd-card.clickable:hover{box-shadow:0 8px 24px rgba(18,40,63,.08);transform:translateY(-2px);cursor:pointer;}
  .wd-input{border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;width:100%;color:var(--blueDark);background:#fff;}
  .wd-input:focus{outline:none;border-color:var(--blue);}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--blueDark);color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:50;}
  .grid-sets{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
  .grid-modes{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;}
  .hero{position:relative;padding:36px 32px;border-radius:18px;background:var(--blueDark);overflow:hidden;margin-bottom:32px;}
  @media (max-width:640px){ .hero-arc{display:none;} }
  .icon-box{width:34px;height:34px;border-radius:9px;background:#EEF4FC;display:flex;align-items:center;justify-content:center;}
  .progress-track{flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--amber));transition:width .3s ease;}
  .flip-scene{perspective:1200px;cursor:pointer;margin-top:20px;height:320px;}
  .flip-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,.2,.2,1);}
  .flip-inner.flipped{transform:rotateY(180deg);}
  .flip-face{position:absolute;inset:0;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;}
  .flip-face.back{transform:rotateY(180deg);background:var(--blueDark);color:#fff;}
  .flip-face.front{background:var(--surface);}
  .modal-overlay{position:fixed;inset:0;background:rgba(18,40,63,.45);display:flex;align-items:center;justify-content:center;z-index:60;}
  .modal-box{background:#fff;border-radius:14px;padding:24px;max-width:340px;width:90%;max-height:85vh;overflow-y:auto;}
  .match-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .match-tile{min-height:90px;padding:10px;font-size:12.5px;cursor:pointer;text-align:left;line-height:1.35;}
  .match-tile.hidden{visibility:hidden;}
  .option-btn{text-align:left;padding:14px 16px;border-radius:10px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:14px;display:flex;justify-content:space-between;align-items:center;width:100%;}
  .row-center{display:flex;justify-content:center;gap:14px;}
  .card-editor-row{display:grid;grid-template-columns:28px 1fr 1fr 32px;gap:10px;align-items:center;padding:14px;}
  @media (max-width:600px){
    .card-editor-row{grid-template-columns:20px 1fr 1fr 28px;}
    .match-grid{grid-template-columns:repeat(2,1fr);}
  }
  @media (prefers-reduced-motion: reduce){ .wd-card,.btn-primary,.flip-inner{transition:none!important;} }

  #login-gate{position:fixed;inset:0;background:var(--blueDark);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;}
  .login-card{background:#fff;border-radius:16px;padding:32px 28px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35);}

  #splash{position:fixed;inset:0;background:var(--blueDark);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:200;transition:opacity .4s ease;}
  #splash.fade-out{opacity:0;pointer-events:none;}
  #splash-logo-slot{animation:splashPulse 1.5s ease-in-out infinite;}
  @keyframes splashPulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.07);opacity:.85;}}
  .splash-text{font-family:'Sora',sans-serif;color:#fff;font-size:19px;font-weight:700;letter-spacing:.4px;}
  @media (prefers-reduced-motion: reduce){ #splash-logo-slot{animation:none;} }

  #main-slot.view-enter{opacity:0;transform:translateY(8px);}
  #main-slot.view-enter-active{opacity:1;transform:translateY(0);transition:opacity .28s ease,transform .28s ease;}
  @media (prefers-reduced-motion: reduce){ #main-slot.view-enter,#main-slot.view-enter-active{opacity:1;transform:none;transition:none;} }

  .sidebar-overlay{position:fixed;inset:0;background:rgba(18,40,63,.4);z-index:90;}
  .sidebar-panel{position:fixed;top:0;left:0;bottom:0;width:260px;max-width:82vw;background:#fff;z-index:91;box-shadow:8px 0 30px rgba(0,0,0,.2);padding:20px 16px;overflow-y:auto;animation:sidebarIn .22s ease;}
  @keyframes sidebarIn{from{transform:translateX(-100%);}to{transform:translateX(0);}}
  .folder-item{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;text-align:left;background:none;border:none;border-radius:8px;padding:10px 10px;cursor:pointer;font-size:14px;color:var(--blueDark);font-family:'Inter',sans-serif;}
  .folder-item:hover{background:var(--bg);}
  .folder-item.active{background:#EEF4FC;color:var(--blue);font-weight:600;}
  @media (prefers-reduced-motion: reduce){ .sidebar-panel{animation:none;} }

  .admin-hub-wrap{display:flex;gap:28px;align-items:flex-start;}
  .admin-sidebar{width:200px;flex-shrink:0;display:flex;flex-direction:column;gap:2px;position:sticky;top:20px;}
  .admin-main{flex:1;min-width:0;}
  @media (max-width:760px){
    .admin-hub-wrap{flex-direction:column;}
    .admin-sidebar{width:100%;flex-direction:row;flex-wrap:wrap;position:static;}
  }

  .dashboard-layout{display:flex;gap:24px;align-items:flex-start;}
  .dashboard-main{flex:1;min-width:0;}
  .leaderboard-widget{width:270px;flex-shrink:0;position:sticky;top:20px;}
  @media (max-width:820px){
    .dashboard-layout{flex-direction:column;}
    .leaderboard-widget{width:100%;position:static;}
  }
  .cert-slide{animation:certSlideIn .5s cubic-bezier(.22,.61,.36,1);}
  @keyframes certSlideIn{from{opacity:0;transform:translateX(32px);}to{opacity:1;transform:translateX(0);}}
  @media (prefers-reduced-motion: reduce){ .cert-slide{animation:none;} }
</style>

  <div class="login-card">

</div>

  <div id="splash-logo-slot"></div>
  <div class="splash-text">StudyDay</div>

<script>
/* ---------------- Data / starter content ---------------- */
const STARTER_SET = {
  name: "Workday HCM Fundamentals",
  description: "Core vocabulary for the Workday HCM certification exam.",
  cards: [
    ["Supervisory Organization","The core org type in Workday HCM that contains workers and is led by a manager; the backbone of the staffing model."],
    ["Business Process","A configurable series of steps (approvals, actions, notifications) that routes a transaction, like Hire or Change Job, through Workday."],
    ["EIB (Enterprise Interface Builder)","A tool for bulk-loading or extracting data into/out of Workday using a spreadsheet template, without custom code."],
    ["Staffing Model","Determines whether a supervisory organization manages Positions, Jobs, or a hybrid of both for headcount and hiring."],
    ["Security Group","A collection of users or a rule that determines what a person can view or edit in Workday, assigned via domain and business process policies."],
    ["Domain Security Policy","Controls access to a functional area of data (like Compensation) by mapping security groups to view/modify permissions."],
    ["Calculated Field","A custom field built from existing Workday data using functions, used in reports and integrations without changing the underlying schema."],
    ["Organization Assignment","The set of organizations (cost center, region, company, etc.) a worker or position is tied to for reporting and security."],
    ["Position Management","A staffing model where each seat (position) is individually defined and filled, commonly used for regulated or headcount-controlled roles."],
    ["Job Management","A staffing model where workers are hired into a job profile rather than a specific position, offering more headcount flexibility."],
    ["Compensation Package","A group of compensation plans (salary, bonus, stock) eligible to be assigned to workers in a given grade or job profile."],
    ["Condition Rule","A true/false rule used to control when a step in a business process should run or a field should display."],
    ["Report Writer","Workday's tool for building custom reports from data sources, business objects, and calculated fields."],
    ["Integration System","A configured connection point (like a Core Connector or Studio integration) that moves data between Workday and external systems."],
    ["Tenant","A customer's dedicated, isolated instance of Workday, containing its own configuration and data."],
    ["Worklet","A small, configurable panel on the Workday home page that gives quick access to tasks or information, like Team or Absence."],
    ["Cost Center","An organization type used to track and report on budgeted expenses, often tied to worker compensation costs."],
    ["Business Process Definition","The specific configuration of steps, approvers, and conditions attached to a business process type for a given context."],
    ["Location Hierarchy","A structured grouping of locations used for reporting, security, and organizational assignment."],
    ["Custom Report","A report built by a customer (rather than delivered by Workday) using Report Writer to meet a specific business need."],
  ]
};

/* ---------------- Firebase (shared cloud sync) ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyCfZnKsQn4j22NRNrCIWTJO9WZG1DZOo_k",
  authDomain: "workday-study-d9a55.firebaseapp.com",
  projectId: "workday-study-d9a55",
  storageBucket: "workday-study-d9a55.firebasestorage.app",
  messagingSenderId: "279501770579",
  appId: "1:279501770579:web:be60f2d921b47c99c39ba6",
};
let fbDb = null;
let fbReady = false;
const fbAuthReady = (async () => {
  try {
    firebase.initializeApp(firebaseConfig);
    fbDb = firebase.firestore();
    await firebase.auth().signInAnonymously();
    fbReady = true;
  } catch (e) {
    console.error("Firebase unavailable — falling back to local-only storage.", e);
    fbReady = false;
  }
})();

// Best-effort helpers: every call is wrapped so a Firebase hiccup (offline,
// rules issue, etc.) never breaks the app — it just quietly stays local-only.
async function fbPull(collection){
  await fbAuthReady;
  if (!fbReady || !fbDb) return null;
  try {
    const snap = await fbDb.collection(collection).get();
    return snap.docs.map(d => d.data());
  } catch (e) { console.error("fbPull failed:", collection, e); return null; }
}
async function fbPullDoc(collection, id){
  await fbAuthReady;
  if (!fbReady || !fbDb) return null;
  try {
    const doc = await fbDb.collection(collection).doc(id).get();
    return doc.exists ? doc.data() : null;
  } catch (e) { console.error("fbPullDoc failed:", collection, id, e); return null; }
}
async function fbPush(collection, id, data){
  await fbAuthReady;
  if (!fbReady || !fbDb) return;
  try { await fbDb.collection(collection).doc(String(id)).set(data); }
  catch (e) { console.error("fbPush failed:", collection, id, e); }
}
async function fbRemove(collection, id){
  await fbAuthReady;
  if (!fbReady || !fbDb) return;
  try { await fbDb.collection(collection).doc(String(id)).delete(); }
  catch (e) { console.error("fbRemove failed:", collection, id, e); }
}

async function fetchAllForBackup(){
  const [cloudSets, cloudEmployees, cloudCerts, cloudFeedback] = await Promise.all([
    fbPull("sets"), fbPull("employees"), fbPull("certificates"), fbPull("feedback"),
  ]);
  let progress = {};
  try {
    await fbAuthReady;
    if (fbReady && fbDb) {
      const snap = await fbDb.collection("progress").get();
      snap.docs.forEach((d) => { progress[d.id] = d.data(); });
    }
  } catch (e) { console.error("progress backup fetch failed:", e); }
  return {
    exportedAt: new Date().toISOString(),
    sets: cloudSets !== null ? cloudSets : state.sets,
    employees: cloudEmployees !== null ? cloudEmployees : loadEmployees(),
    certificates: cloudCerts !== null ? cloudCerts : loadCertificates(),
    feedback: cloudFeedback !== null ? cloudFeedback : loadFeedback(),
    progress,
  };
}

function downloadJson(filename, dataObj){
  const blob = new Blob([JSON.stringify(dataObj, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

const STORAGE_KEY = "wd_study_sets_v1";
const FOLDERS = ["HCM Core", "Supply Chain", "Financial", "Learning and Talent", "Benefits"];
const LEADERBOARD_CATEGORIES = [
  { label: "Overall Leaderboard", folder: null },
  { label: "HCM Core Leaderboard", folder: "HCM Core" },
  { label: "SCM Leaderboard", folder: "Supply Chain" },
  { label: "Financial Leaderboard", folder: "Financial" },
];
const TICKET_CATEGORIES = ["Bug", "Feature request", "Content issue", "Other"];
const TICKET_PRIORITIES = ["Low", "Medium", "High"];
const PRIORITY_COLOR = { Low: "var(--gray)", Medium: "var(--blue)", High: "var(--red)" };
const STATUS_COLOR = { "Open": "var(--orange)", "In Progress": "var(--blue)", "Resolved": "var(--green)" };

function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function esc(s){ const d=document.createElement("div"); d.innerText = s==null? "": s; return d.innerHTML; }

/* ---------------- Local storage helpers ---------------- */
function loadSets(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  const starter = {
    id: uid(), name: STARTER_SET.name, description: STARTER_SET.description,
    cards: STARTER_SET.cards.map(([term,definition]) => ({id: uid(), term, definition})),
    updatedAt: Date.now()
  };
  const sets = [starter];
  saveSets(sets);
  return sets;
}
function saveSets(sets){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sets)); } catch(e) {}
}

function safeRender(){
  if (document.querySelector(".modal-overlay, .sidebar-overlay")) return;
  const active = document.activeElement;
  if (active && ["INPUT","TEXTAREA","SELECT"].includes(active.tagName)) return;
  render();
}

async function syncSetsFromCloud(){
  const cloud = await fbPull("sets");
  if (cloud === null) return;
  if (cloud.length === 0) { state.sets.forEach(s => fbPush("sets", s.id, s)); return; }
  state.sets = cloud;
  saveSets(state.sets);
  safeRender();
}

/* ---------------- Feedback / future-fixes notes ---------------- */
const FEEDBACK_KEY = "wd_feedback_v1";
/* ---------------- Employee identity & progress tracking ---------------- */
const EMPLOYEES_KEY = "wd_employees_v1";
const PROGRESS_KEY = "wd_progress_v1";
const CURRENT_EMPLOYEE_KEY = "wd_current_employee_id"; // sessionStorage — resets when the tab closes, like the site login

function loadEmployees(){
  try { const raw = localStorage.getItem(EMPLOYEES_KEY); return raw ? JSON.parse(raw) : []; } catch(e) { return []; }
}
function saveEmployees(list){
  try { localStorage.setItem(EMPLOYEES_KEY, JSON.stringify(list)); } catch(e) {}
}
async function syncEmployeesFromCloud(){
  const cloud = await fbPull("employees");
  if (cloud === null) return;
  const local = loadEmployees();
  if (cloud.length === 0) { local.forEach(e => fbPush("employees", e.id, e)); return; }
  const merged = [...cloud];
  local.forEach(le => { if (!merged.some(ce => ce.id === le.id)) merged.push(le); });
  saveEmployees(merged);
  safeRender();
}

// Combines any employees that share the same name (case-insensitive) into one
// profile — keeps the oldest one, sums/merges progress, reassigns certs, and
// removes the extras both locally and in Firestore.
async function mergeDuplicateEmployees(){
  await syncEmployeesFromCloud();
  const employees = loadEmployees();
  const groups = {};
  employees.forEach(e => {
    const key = e.name.trim().toLowerCase();
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });

  const progressStore = loadProgress();
  const certificates = loadCertificates();
  const survivors = [];
  const removedIds = [];
  const changedCertIds = [];

  Object.values(groups).forEach(group => {
    if (group.length === 1) { survivors.push(group[0]); return; }
    group.sort((a,b) => (a.createdAt || 0) - (b.createdAt || 0));
    const primary = group[0];
    survivors.push(primary);
    const primaryProgress = getEmployeeProgress(progressStore, primary.id);
    for (let i = 1; i < group.length; i++) {
      const dup = group[i];
      const dupProgress = progressStore[dup.id];
      if (dupProgress) {
        primaryProgress.totalTimeMs += dupProgress.totalTimeMs || 0;
        primaryProgress.learnCorrect += dupProgress.learnCorrect || 0;
        primaryProgress.learnTotal += dupProgress.learnTotal || 0;
        Object.keys(dupProgress.mastered || {}).forEach(setId => {
          if (!primaryProgress.mastered[setId]) primaryProgress.mastered[setId] = [];
          (dupProgress.mastered[setId] || []).forEach(cardId => {
            if (!primaryProgress.mastered[setId].includes(cardId)) primaryProgress.mastered[setId].push(cardId);
          });
        });
        delete progressStore[dup.id];
        fbRemove("progress", dup.id);
      }
      certificates.forEach(c => {
        if (c.employeeId === dup.id) { c.employeeId = primary.id; c.employeeName = primary.name; changedCertIds.push(c.id); }
      });
      removedIds.push(dup.id);
    }
    fbPush("progress", primary.id, primaryProgress);
  });

  if (removedIds.length === 0) { showToast("No duplicate profiles found."); return; }

  saveEmployees(survivors);
  saveProgress(progressStore);
  saveCertificates(certificates);
  removedIds.forEach(id => fbRemove("employees", id));
  certificates.filter(c => changedCertIds.includes(c.id)).forEach(c => fbPush("certificates", c.id, c));

  if (removedIds.includes(state.currentEmployeeId)) {
    const myOldName = employees.find(e => e.id === state.currentEmployeeId).name.trim().toLowerCase();
    const primary = groups[myOldName][0];
    state.currentEmployeeId = primary.id;
    try { sessionStorage.setItem(CURRENT_EMPLOYEE_KEY, primary.id); } catch(e) {}
  }

  showToast(`Merged ${removedIds.length} duplicate profile(s).`);
  render();
}

function loadProgress(){
  try { const raw = localStorage.getItem(PROGRESS_KEY); return raw ? JSON.parse(raw) : {}; } catch(e) { return {}; }
}
function saveProgress(obj){
  try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(obj)); } catch(e) {}
}
async function syncProgressFromCloud(){
  await fbAuthReady;
  if (!fbReady || !fbDb) return;
  try {
    const snap = await fbDb.collection("progress").get();
    if (snap.empty) {
      const local = loadProgress();
      Object.keys(local).forEach(empId => fbPush("progress", empId, local[empId]));
      return;
    }
    const merged = {};
    snap.docs.forEach(d => { merged[d.id] = d.data(); });
    saveProgress(merged);
    safeRender();
  } catch (e) { console.error("syncProgressFromCloud failed:", e); }
}
function getEmployeeProgress(progressStore, employeeId){
  if (!progressStore[employeeId]) {
    progressStore[employeeId] = { totalTimeMs: 0, learnCorrect: 0, learnTotal: 0, mastered: {} };
  }
  return progressStore[employeeId];
}
function recordMastered(employeeId, setId, cardId){
  const store = loadProgress();
  const p = getEmployeeProgress(store, employeeId);
  if (!p.mastered[setId]) p.mastered[setId] = [];
  if (!p.mastered[setId].includes(cardId)) p.mastered[setId].push(cardId);
  saveProgress(store);
  fbPush("progress", employeeId, p);
}
function recordLearnAnswer(employeeId, correct){
  const store = loadProgress();
  const p = getEmployeeProgress(store, employeeId);
  p.learnTotal++;
  if (correct) p.learnCorrect++;
  saveProgress(store);
  fbPush("progress", employeeId, p);
}
function addStudyTime(employeeId, ms){
  const store = loadProgress();
  const p = getEmployeeProgress(store, employeeId);
  p.totalTimeMs += ms;
  saveProgress(store);
  fbPush("progress", employeeId, p);
}
function formatDuration(ms){
  const mins = Math.round(ms / 60000);
  if (mins < 1) return "< 1 min";
  if (mins < 60) return `${mins} min`;
  const h = Math.floor(mins / 60), m = mins % 60;
  return m ? `${h}h ${m}m` : `${h}h`;
}
function overallMasteryPct(employeeId, sets){
  const store = loadProgress();
  const p = getEmployeeProgress(store, employeeId);
  const totalCards = sets.reduce((sum,s) => sum + s.cards.length, 0);
  if (totalCards === 0) return 0;
  const masteredCount = Object.values(p.mastered).reduce((sum, arr) => sum + arr.length, 0);
  return Math.min(100, Math.round((masteredCount / totalCards) * 100));
}
function accuracyPct(employeeId){
  const store = loadProgress();
  const p = getEmployeeProgress(store, employeeId);
  if (p.learnTotal === 0) return null;
  return Math.round((p.learnCorrect / p.learnTotal) * 100);
}

// Resizes + recompresses an image client-side before it ever touches storage,
// since raw phone photos would blow through localStorage's ~5-10MB cap fast.
function compressImageFile(file, maxDim, quality){
  maxDim = maxDim || 480; quality = quality || 0.72;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h && w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
        else if (h >= w && h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = () => reject(new Error("Couldn't read that image."));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error("Couldn't read that file."));
    reader.readAsDataURL(file);
  });
}

// This is the ONE place that turns "raw imported text" into a set object.
// When shared/cloud storage is added later, this function's OUTPUT (a plain
// {name, description, cards} object) is exactly what gets written there too —
// nothing else about this flow needs to change.
const CLAUDE_IMPORT_PROMPT = `Turn the attached document into flashcards for studying.

If the document already contains a list of questions and answers, use those directly rather than inventing new ones:
- "term" = the actual question wording itself, with any label or number stripped off (e.g. from "Question 3: What is a Supervisory Organization?" the term is "What is a Supervisory Organization?" — never just "Question 3").
- "definition" = ONLY the short correct answer itself, with no "Correct Answer —" prefix, no answer-choice letter (A/B/C/D), and no extra reasoning folded in. Just the answer, plain.
- "explanation" = if the source explains WHY that answer is correct, put that reasoning here instead of cramming it into "definition". Omit this field entirely if there's no separate reasoning given.

If the document does NOT already contain questions and answers, generate flashcards covering the key terms, concepts, and facts a student would actually be tested on, with each definition kept to 1-3 concise sentences (explanation can be omitted).

Return ONLY a JSON array (no markdown, no code fences, no extra commentary) where each item looks like:
{"term": "...", "definition": "...", "explanation": "..."}
("explanation" is optional — omit the key entirely for any card that doesn't have extra reasoning to add.)`;

// Loads the mammoth.js library on demand (only when someone actually
// uploads a .docx) so the app has zero extra network cost otherwise.
let mammothLoadPromise = null;
function loadMammoth(){
  if (window.mammoth) return Promise.resolve();
  if (mammothLoadPromise) return mammothLoadPromise;
  mammothLoadPromise = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js";
    s.onload = () => resolve();
    s.onerror = () => reject(new Error("Couldn't load the document reader — check your network connection."));
    document.head.appendChild(s);
  });
  return mammothLoadPromise;
}

function parseImportedCards(raw){
  let data;
  try { data = JSON.parse(raw); }
  catch(e) { return { error: "That doesn't look like valid JSON. Make sure you copied the full response and nothing else." }; }
  let cards, name, description;
  if (Array.isArray(data)) {
    cards = data;
  } else if (data && Array.isArray(data.cards)) {
    cards = data.cards; name = data.name; description = data.description;
  } else {
    return { error: "Expected a JSON array of cards, or an object with a \"cards\" array." };
  }
  const cleaned = cards
    .map(c => ({
      term: (c && (c.term || c.Term) ? String(c.term || c.Term) : "").trim(),
      definition: (c && (c.definition || c.Definition) ? String(c.definition || c.Definition) : "").trim(),
      explanation: (c && (c.explanation || c.Explanation) ? String(c.explanation || c.Explanation) : "").trim(),
    }))
    .filter(c => c.term && c.definition);
  if (cleaned.length === 0) return { error: "No valid term/definition pairs were found in that JSON." };
  return { cards: cleaned, name, description };
}

async function sha256Hex(str){
  const enc = new TextEncoder().encode(str);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

/* ---------------- Leaderboard & personal progress ---------------- */
function viewLeaderboard(){
  const employees = loadEmployees();
  const me = employees.find(e => e.id === state.currentEmployeeId);
  const tab = state.leaderboardTab || "ranking";

  const rows = employees.map(e => ({
    id: e.id, name: e.name, avatar: employeeAvatar(e),
    mastery: overallMasteryPct(e.id, state.sets),
    accuracy: accuracyPct(e.id),
    time: (loadProgress()[e.id] || {}).totalTimeMs || 0,
  })).filter(r => r.mastery > 0 || r.accuracy !== null || r.time > 0);
  const sortKey = state.leaderboardSort;
  rows.sort((a,b) => {
    if (sortKey === "accuracy") return (b.accuracy||0) - (a.accuracy||0);
    if (sortKey === "time") return b.time - a.time;
    return b.mastery - a.mastery;
  });

  const tabs = `
    <div style="display:flex;gap:6px;margin-bottom:20px;">
      <button class="btn-ghost" data-action="leaderboard-tab" data-tab="ranking" style="font-size:13px;padding:7px 14px;border-radius:999px;border:1px solid ${tab==="ranking"?"var(--blue)":"var(--border)"};color:${tab==="ranking"?"var(--blue)":"var(--gray)"};">${ICONS.trophy} Leaderboard</button>
      <button class="btn-ghost" data-action="leaderboard-tab" data-tab="mine" style="font-size:13px;padding:7px 14px;border-radius:999px;border:1px solid ${tab==="mine"?"var(--blue)":"var(--border)"};color:${tab==="mine"?"var(--blue)":"var(--gray)"};">My progress</button>
    </div>`;

  if (tab === "mine") {
    if (!me) return `<button class="btn-ghost" data-action="go-home" style="margin-bottom:16px;">${ICONS.back} Back</button>${tabs}<p style="color:var(--gray);font-size:13px;">Check in with your name first to see your progress.</p>`;
    const myMastery = overallMasteryPct(me.id, state.sets);
    const myAccuracy = accuracyPct(me.id);
    const myTime = (loadProgress()[me.id] || {}).totalTimeMs || 0;
    return `
      <button class="btn-ghost" data-action="go-home" style="margin-bottom:16px;">${ICONS.back} Back</button>
      ${tabs}
      <h2 class="wd-h" style="font-size:20px;margin:0 0 16px;display:flex;align-items:center;gap:10px;"><span style="font-size:24px;">${employeeAvatar(me)}</span> ${esc(me.name)}'s progress</h2>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:26px;">
        <div class="wd-card" style="padding:18px;text-align:center;">
          <div class="wd-h" style="font-size:26px;color:var(--orange);">${myMastery}%</div>
          <div style="font-size:12px;color:var(--gray);">Overall mastery</div>
        </div>
        <div class="wd-card" style="padding:18px;text-align:center;">
          <div class="wd-h" style="font-size:26px;color:var(--blue);">${myAccuracy===null?"—":myAccuracy+"%"}</div>
          <div style="font-size:12px;color:var(--gray);">Learn accuracy</div>
        </div>
        <div class="wd-card" style="padding:18px;text-align:center;">
          <div class="wd-h" style="font-size:26px;color:var(--green);">${formatDuration(myTime)}</div>
          <div style="font-size:12px;color:var(--gray);">Time studied</div>
        </div>
      </div>
      <h3 class="wd-h" style="font-size:15px;margin:0 0 10px;">By set — what to focus on next</h3>
      ${state.sets.length === 0 ? `<p style="font-size:13px;color:var(--gray);">No sets yet.</p>` : `
        <div style="display:grid;gap:10px;">
          ${state.sets.map(s => {
            const store = loadProgress();
            const p = getEmployeeProgress(store, me.id);
            const masteredCount = (p.mastered[s.id] || []).length;
            const pct = s.cards.length ? Math.round((masteredCount/s.cards.length)*100) : 0;
            return `
              <div class="wd-card" style="padding:14px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                  <span style="font-size:13.5px;color:var(--blueDark);font-weight:600;">${esc(s.name)}</span>
                  <span style="font-size:12px;color:var(--gray);">${masteredCount}/${s.cards.length} mastered</span>
                </div>
                <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
              </div>`;
          }).join("")}
        </div>
      `}
    `;
  }

  return `
    <button class="btn-ghost" data-action="go-home" style="margin-bottom:16px;">${ICONS.back} Back</button>
    ${tabs}
    <h2 class="wd-h" style="font-size:20px;margin:0 0 4px;">Leaderboard</h2>
    <p style="font-size:13px;color:var(--gray);margin:0 0 18px;">Ranked across your whole team.</p>
    <div style="display:flex;gap:6px;margin-bottom:14px;">
      ${[["mastery","Mastery"],["accuracy","Accuracy"],["time","Time studied"]].map(([key,label]) => `
        <button class="btn-ghost" data-action="leaderboard-sort" data-sort="${key}" style="font-size:12px;padding:5px 11px;border-radius:999px;border:1px solid ${sortKey===key?"var(--blue)":"var(--border)"};color:${sortKey===key?"var(--blue)":"var(--gray)"};">${label}</button>
      `).join("")}
    </div>
    ${rows.length === 0 ? `<p style="font-size:13px;color:var(--gray);">No one's checked in on this device yet.</p>` : `
      <div style="display:grid;gap:8px;">
        ${rows.map((r,i) => `
          <div class="wd-card" style="padding:14px 16px;display:flex;align-items:center;gap:14px;${r.id===state.currentEmployeeId?"border-color:var(--orange);":""}">
            <span class="wd-h" style="font-size:16px;color:var(--gray);width:24px;">${i+1}</span>
            <span style="font-size:20px;">${r.avatar}</span>
            <span style="flex:1;font-size:14px;color:var(--blueDark);font-weight:600;">${esc(r.name)}${r.id===state.currentEmployeeId?" (you)":""}</span>
            <span style="font-size:13px;color:var(--orange);width:52px;text-align:right;">${r.mastery}%</span>
            <span style="font-size:13px;color:var(--blue);width:52px;text-align:right;">${r.accuracy===null?"—":r.accuracy+"%"}</span>
            <span style="font-size:13px;color:var(--green);width:70px;text-align:right;">${formatDuration(r.time)}</span>
          </div>
        `).join("")}
      </div>
    `}
  `;
}

  return `

function logoMark(size){
  const gid = "lg" + Math.round(Math.random()*999999);
  return `<svg width="${size}" height="${size}" viewBox="0 0 40 40">
    <defs><linearGradient id="${gid}" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FDBA58"/><stop offset="100%" stop-color="#F4990B"/>
    </linearGradient></defs>
    <circle cx="20" cy="20" r="18" fill="#12283F"/>
    <path d="M 9 22 A 12 12 0 0 1 31 22" fill="none" stroke="url(#${gid})" stroke-width="4" stroke-linecap="round"/>
  </svg>`;
}
function progressArc(pct, size, stroke){
  size = size||44; stroke = stroke||5;
  const r=(size-stroke)/2, c=2*Math.PI*r, offset=c*(1-pct/100);
  const gid = "arc"+Math.round(Math.random()*99999);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <defs><linearGradient id="${gid}" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F4990B"/><stop offset="100%" stop-color="#FDBA58"/>
    </linearGradient></defs>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#E3E8EF" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#${gid})" stroke-width="${stroke}" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .5s ease"/>
    <text x="50%" y="50%" text-anchor="middle" dy="0.35em" font-size="${size*0.28}" font-weight="700" fill="#12283F" font-family="Sora,sans-serif">${Math.round(pct)}</text>
  </svg>`;
}

  return state.sets.find(s => s.id === state.activeSetId) || null;
}

function persistActiveSetEdit(setObj){
  const idx = state.sets.findIndex(s => s.id === setObj.id);
  const clean = {...setObj, updatedAt: Date.now()};
  if (idx >= 0) state.sets[idx] = clean; else state.sets.push(clean);
  saveSets(state.sets);
  fbPush("sets", clean.id, clean);
  showToast("Saved — syncing with your team.");
}

function deleteSet(id){
  state.sets = state.sets.filter(s => s.id !== id);
  saveSets(state.sets);
  fbRemove("sets", id);
  showToast("Set deleted.");
  render();
}

/* ---------------- Learn ---------------- */
function buildLearnQueue(cards, employeeId, setId){
  let weak = cards, strong = [];
  if (employeeId && setId) {
    const store = loadProgress();
    const p = store[employeeId];
    const masteredIds = (p && p.mastered && p.mastered[setId]) || [];
    weak = cards.filter(c => !masteredIds.includes(c.id));
    strong = cards.filter(c => masteredIds.includes(c.id));
  }
  const ordered = [...shuffle(weak), ...shuffle(strong)]; // not-yet-mastered cards surface first
  return ordered.map(c => {
    const others = shuffle(cards.filter(x=>x.id!==c.id)).slice(0,3);
    return { card:c, options: shuffle([c, ...others]) };
  });
}
function viewLearn(){
  const s = getActiveSet();
  if (!s) { state.view="dashboard"; return viewDashboard(); }

  if (ses.qi >= ses.queue.length) {

  const feedback = ses.selected ? (

          <p style="font-size:13.5px;color:var(--blueDark);margin:0;line-height:1.5;"><strong>${esc(cur.card.term)}</strong> — ${esc(cur.card.definition)}</p>

    </div>
  `;
}

/* ---------------- Match ---------------- */
function buildMatchTiles(cards){
  const chosen = shuffle(cards).slice(0, Math.min(8, cards.length));
  const tiles = [];
  chosen.forEach(c => {
    tiles.push({key:c.id+"-t", cardId:c.id, text:c.term, matched:false});
    tiles.push({key:c.id+"-d", cardId:c.id, text:c.definition, matched:false});
  });
  return shuffle(tiles);
}
function viewMatch(){
  const s = getActiveSet();
  if (!s) { state.view="dashboard"; return viewDashboard(); }
  if (!state.session || state.session.mode !== "match") {
    state.session = { mode:"match", tiles: buildMatchTiles(s.cards), selected:[], wrong:[], seconds:0, done:false, timer:null };
    state.session.timer = setInterval(() => {
      if (state.session && !state.session.done) { state.session.seconds++; tickSeconds(); }
    }, 1000);
  }
  const ses = state.session;
  if (ses.done) {
    return summaryScreen("Matched!", [{label:"Time", value: ses.seconds+"s", color:"var(--orange)"}], [], true);
  }
  return `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;">
      <button class="btn-ghost" data-action="exit-mode">${ICONS.back} Exit</button>
      <div style="flex:1;"></div>
      <span id="match-timer" style="font-size:13px;color:var(--gray);">${ses.seconds}s</span>
    </div>
    <div class="match-grid">
      ${ses.tiles.map(t => {
        if (t.matched) return `<div class="match-tile hidden"></div>`;
        const isSel = ses.selected.includes(t.key);
        const isWrong = ses.wrong.includes(t.key);
        let style = "";
        if (isWrong) style = "border-color:var(--red);background:#FBEAE8;";
        else if (isSel) style = "border-color:var(--orange);background:#FFF6E9;";
        return `<button class="wd-card match-tile" style="${style}" data-action="match-pick" data-key="${t.key}">${esc(t.text)}</button>`;
      }).join("")}
    </div>
  `;
}
function tickSeconds(){
  const el = document.getElementById("match-timer");
  if (el && state.session) el.textContent = state.session.seconds + "s";
}

  return `

/* ---------------- Event binding ---------------- */
function bindEvents(){
  const root = document.getElementById("root");

  // editor live input binding
  const nameInput = document.getElementById("set-name");
  const descInput = document.getElementById("set-desc");
  if (nameInput) nameInput.addEventListener("input", e => { state.editorDraft.name = e.target.value; });
  if (descInput) descInput.addEventListener("input", e => { state.editorDraft.description = e.target.value; });
  const folderSelect = document.getElementById("set-folder");
  if (folderSelect) folderSelect.addEventListener("change", e => { state.editorDraft.folder = e.target.value || null; });
  const passInput = document.getElementById("admin-passcode-input");
  if (passInput) passInput.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); handleAction("submit-admin-passcode"); }
  });
  const importFileInput = document.getElementById("import-file-input");
  if (importFileInput) importFileInput.addEventListener("change", e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const ta = document.getElementById("import-json");
      if (ta) ta.value = reader.result;
    };
    reader.readAsText(file);
  });
  const certPhotoInput = document.getElementById("cert-photo-input");
  if (certPhotoInput) certPhotoInput.addEventListener("change", async e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    state.certError = null;
    try {
      state.certPhotoDataUrl = await compressImageFile(file);
    } catch(err) {
      state.certError = err && err.message ? err.message : "Couldn't read that photo.";
    }
    render();
  });
  const extractInput = document.getElementById("import-extract-input");
  if (extractInput) extractInput.addEventListener("change", async e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    state.extractedText = "";
    state.extractStatus = "Reading " + file.name + "...";
    render();
    try {
      if (/\.docx$/i.test(file.name)) {
        await loadMammoth();
        const arrayBuffer = await file.arrayBuffer();
        const result = await window.mammoth.extractRawText({ arrayBuffer });
        state.extractedText = (result.value || "").trim();
      } else {
        state.extractedText = (await file.text()).trim();
      }
      state.extractStatus = state.extractedText
        ? `Extracted ${state.extractedText.length.toLocaleString()} characters from ${file.name}.`
        : `Couldn't find any text in ${file.name}.`;
    } catch (err) {
      state.extractStatus = err && err.message ? err.message : "Couldn't read that file.";
    }
    render();
  });
  const extractedTextEl = document.getElementById("extracted-text");
  if (extractedTextEl) extractedTextEl.value = state.extractedText;
  root.querySelectorAll("[data-field]").forEach(inp => {
    inp.addEventListener("input", e => {
      const cardId = inp.getAttribute("data-card-id");
      const field = inp.getAttribute("data-field");
      const card = state.editorDraft.cards.find(c => c.id === cardId);
      if (card) card[field] = e.target.value;
    });
  });
}

async function handleAction(action, el){
  switch(action){
    case "open-admin":
      if (!isAdminUser()) return;
      if (state.adminUnlocked) { state.view = "admin-hub"; render(); return; }
      state.adminModalOpen = true; state.adminError = false; render();
      setTimeout(() => { const inp=document.getElementById("admin-passcode-input"); if(inp) inp.focus(); }, 0);
      return;
    case "close-admin": case "close-admin-bg":
      state.adminModalOpen = false; state.adminError = false; render(); return;
    case "exit-admin-hub":
      state.view = "dashboard"; render(); return;
    case "admin-select-section":
      state.adminSection = el.getAttribute("data-section"); render(); return;
    case "open-feedback":
      state.feedbackModalOpen = true; render();
      setTimeout(() => { const t=document.getElementById("feedback-input"); if(t) t.focus(); }, 0);
      return;
    case "close-feedback": case "close-feedback-bg":
      state.feedbackModalOpen = false; render(); return;
    case "submit-feedback": {
      const t = document.getElementById("feedback-input");
      const catSel = document.getElementById("feedback-category");
      const prioSel = document.getElementById("feedback-priority");
      const text = t ? t.value.trim() : "";
      if (!text) return;
      const newTicket = {
        id: uid(), text, at: Date.now(),
        category: catSel ? catSel.value : "Other",
        priority: prioSel ? prioSel.value : "Medium",
        status: "Open",
      };
      state.feedback.push(newTicket);
      saveFeedback(state.feedback);
      fbPush("feedback", newTicket.id, newTicket);
      render();
      return;
    }
    case "delete-feedback": {
      const id = el.getAttribute("data-id");
      state.feedback = state.feedback.filter(n => n.id !== id);
      saveFeedback(state.feedback);
      fbRemove("feedback", id);
      render();
      return;
    }
    case "admin-set-ticket-status": {
      const id = el.getAttribute("data-id");
      const status = el.getAttribute("data-status");
      const t = state.feedback.find(x => x.id === id);
      if (t) { t.status = status; saveFeedback(state.feedback); fbPush("feedback", t.id, t); }
      render();
      return;
    }
    case "admin-filter-tickets":
      state.adminTicketFilter = el.getAttribute("data-filter");
      render();
      return;
    case "admin-delete-cert": {
      const id = el.getAttribute("data-id");
      const list = loadCertificates().filter(c => c.id !== id);
      saveCertificates(list);
      fbRemove("certificates", id);
      showToast("Certificate removed.");
      render();
      return;
    }
    case "toggle-maintenance": {
      if (!isAdminUser()) return;
      const enable = el.getAttribute("data-enable") === "1";
      setMaintenance(enable);
      showToast(enable ? "Maintenance mode is on." : "Maintenance mode is off.");
      render();
      return;
    }
    case "merge-duplicate-employees":
      if (!isAdminUser()) return;
      await mergeDuplicateEmployees();
      return;
    case "export-backup": {
      if (!isAdminUser()) return;
      showToast("Building backup...");
      try {
        const data = await fetchAllForBackup();
        const stamp = new Date().toISOString().slice(0, 10);
        downloadJson(`studyday-backup-${stamp}.json`, data);
        showToast("Backup downloaded.");
      } catch (e) {
        console.error("Backup failed:", e);
        showToast("Backup failed — check your connection and try again.");
      }
      return;
    }
    case "toggle-admin-timeout": {
      if (!isAdminUser()) return;
      const enable = el.getAttribute("data-enable") === "1";
      setInactivityLockoutDisabled(enable);
      showToast(enable ? "Inactivity timeout is off for you." : "Inactivity timeout is back on.");
      render();
      return;
    }
    case "open-reset-pin":
      if (!isAdminUser()) return;
      state.resetPinEmployeeId = el.getAttribute("data-id"); state.resetPinError = null; render(); return;
    case "close-reset-pin":
      state.resetPinEmployeeId = null; state.resetPinError = null; render(); return;
    case "submit-reset-pin": {
      if (!isAdminUser()) return;
      const emp = loadEmployees().find(e => e.id === state.resetPinEmployeeId);
      if (!emp) return;
      const p1 = document.getElementById("reset-pin-input");
      const p2 = document.getElementById("reset-pin-input2");
      const pin = p1 ? p1.value.trim() : "";
      const pin2 = p2 ? p2.value.trim() : "";
      if (!/^\d{4}$/.test(pin)) { state.resetPinError = "PIN must be exactly 4 digits."; render(); return; }
      if (pin !== pin2) { state.resetPinError = "PINs don't match."; render(); return; }
      const hash = await sha256Hex(emp.name.toLowerCase() + "|" + pin);
      const list = loadEmployees();
      const target = list.find(e => e.id === emp.id);
      target.pinHash = hash;
      saveEmployees(list);
      fbPush("employees", target.id, target);
      state.resetPinEmployeeId = null; state.resetPinError = null;
      showToast(`PIN reset for ${emp.name}.`);
      render();
      return;
    }
    case "toggle-suspend-employee": {
      if (!isAdminUser()) return;
      const id = el.getAttribute("data-id");
      const list = loadEmployees();
      const target = list.find(e => e.id === id);
      if (!target) return;
      target.suspended = !target.suspended;
      saveEmployees(list);
      fbPush("employees", target.id, target);
      showToast(target.suspended ? `${target.name} suspended.` : `${target.name} unsuspended.`);
      render();
      return;
    }
    case "delete-employee": {
      if (!isAdminUser()) return;
      const id = el.getAttribute("data-id");
      const list = loadEmployees();
      const target = list.find(e => e.id === id);
      if (!target) return;
      if (!confirm(`Delete ${target.name}'s profile? This can't be undone.`)) return;
      saveEmployees(list.filter(e => e.id !== id));
      fbRemove("employees", id);
      showToast(`${target.name}'s profile was deleted.`);
      render();
      return;
    }
    case "cert-carousel-select":
      state.certCarouselIndex = parseInt(el.getAttribute("data-index"), 10) || 0;
      render();
      return;
    case "leaderboard-widget-select":
      state.leaderboardCarouselIndex = parseInt(el.getAttribute("data-index"), 10) || 0;
      render();
      return;
    case "open-sidebar":
      state.sidebarOpen = true; render(); return;
    case "open-move-folder":
      state.moveFolderSetId = el.getAttribute("data-id"); render(); return;
    case "close-move-folder": case "close-move-folder-bg":
      state.moveFolderSetId = null; render(); return;
    case "move-set-folder": {
      const id = el.getAttribute("data-id");
      const folder = el.getAttribute("data-folder") || null;
      const s = state.sets.find(x => x.id === id);
      if (s) {
        s.folder = folder;
        s.updatedAt = Date.now();
        saveSets(state.sets);
        showToast(folder ? `Moved to ${folder}.` : "Removed from folder.");
      }
      state.moveFolderSetId = null;
      render();
      return;
    }
    case "close-sidebar":
      state.sidebarOpen = false; render(); return;
    case "select-folder": {
      const f = el.getAttribute("data-folder");
      state.activeFolder = f === "" ? null : f;
      state.sidebarOpen = false;
      state.view = "dashboard";
      render();
      return;
    }
    case "open-import":
      state.importModalOpen = true; state.importError = null;
      state.extractedText = ""; state.extractStatus = null;
      state.importPreviewCards = null; state.importRawJson = ""; state.importNameAtPreview = ""; state.importParsedName = "";
      render(); return;
    case "close-import": case "close-import-bg":
      state.importModalOpen = false; state.importError = null;
      state.extractedText = ""; state.extractStatus = null;
      state.importPreviewCards = null; state.importRawJson = ""; state.importNameAtPreview = ""; state.importParsedName = "";
      render(); return;
    case "copy-extracted-text": {
      try {
        await navigator.clipboard.writeText(state.extractedText);
        showToast("Text copied — paste it into a Claude conversation.");
      } catch(e) {
        showToast("Couldn't copy automatically — select the text and copy it manually.");
      }
      return;
    }
    case "copy-import-prompt": {
      try {
        await navigator.clipboard.writeText(CLAUDE_IMPORT_PROMPT);
        showToast("Prompt copied — paste it into a Claude conversation with your document attached.");
      } catch(e) {
        showToast("Couldn't copy automatically — select and copy the text above.");
      }
      return;
    }
    case "preview-import": {
      const nameInput = document.getElementById("import-set-name");
      const jsonInput = document.getElementById("import-json");
      state.importNameAtPreview = nameInput ? nameInput.value.trim() : "";
      const raw = jsonInput ? jsonInput.value.trim() : "";
      state.importRawJson = raw;
      if (!raw) { state.importError = "Paste in the JSON you got back first."; render(); return; }
      const result = parseImportedCards(raw);
      if (result.error) { state.importError = result.error; render(); return; }
      state.importError = null;
      state.importParsedName = result.name || "";
      state.importPreviewCards = result.cards.map(c => ({ id: uid(), term: c.term, definition: c.definition, explanation: c.explanation || "" }));
      render();
      return;
    }
    case "remove-preview-card": {
      const id = el.getAttribute("data-id");
      state.importPreviewCards = state.importPreviewCards.filter(c => c.id !== id);
      render();
      return;
    }
    case "back-to-json":
      state.importPreviewCards = null;
      render();
      return;
    case "submit-import": {
      if (!state.importPreviewCards || state.importPreviewCards.length === 0) return;
      const nameInput = document.getElementById("import-set-name");
      const folderSelect = document.getElementById("import-set-folder");
      const typedName = nameInput ? nameInput.value.trim() : "";
      const finalName = typedName || state.importParsedName || "Imported set";
      const newSet = {
        id: uid(),
        name: finalName,
        description: "",
        cards: state.importPreviewCards.map(c => ({ id: uid(), term: c.term, definition: c.definition, explanation: c.explanation || "" })),
        folder: folderSelect ? (folderSelect.value || null) : null,
      };
      persistActiveSetEdit(newSet);
      state.importModalOpen = false; state.importError = null;
      state.importPreviewCards = null; state.importRawJson = ""; state.importNameAtPreview = ""; state.importParsedName = "";
      state.view = "dashboard";
      render();
      return;
    }
    case "submit-admin-passcode": {
      const inp = document.getElementById("admin-passcode-input");
      const val = inp ? inp.value : "";
      const hash = await sha256Hex(val);
      if (hash === ADMIN_PASSCODE_HASH && isAdminUser()) {
        state.adminUnlocked = true; state.adminError = false;
        state.adminModalOpen = false;
        state.view = "admin-hub";
      } else {
        state.adminError = true;
      }
      render();
      return;
    }
    case "pin-select-employee":
      state.pinGateSelectedId = el.getAttribute("data-id"); state.pinGateError = null; render(); return;
    case "pin-back":
      state.pinGateSelectedId = null; state.pinGateRegistering = false; state.pinGateError = null; render(); return;
    case "pin-start-register":
      state.pinGateRegistering = true; state.pinGateError = null; render(); return;
    case "pin-submit": {
      const inp = document.getElementById("pin-enter-input");
      const pin = inp ? inp.value.trim() : "";
      const employees = loadEmployees();
      const emp = employees.find(e => e.id === state.pinGateSelectedId);
      if (!emp) { state.pinGateError = "Something went wrong — try again."; render(); return; }
      const hash = await sha256Hex(emp.name.toLowerCase() + "|" + pin);
      if (hash === emp.pinHash) {
        if (emp.suspended) { state.pinGateError = "This profile has been suspended — contact your admin."; render(); return; }
        state.currentEmployeeId = emp.id;
        try { sessionStorage.setItem(CURRENT_EMPLOYEE_KEY, emp.id); } catch(e) {}
        state.pinGateSelectedId = null; state.pinGateError = null;
        if (isMaintenanceOn() && !isAdminUser()) { showMaintenanceScreen(); return; }
        state.view = "dashboard";
        render();
      } else {
        state.pinGateError = "Incorrect PIN.";
        render();
      }
      return;
    }
    case "pin-register-submit": {
      const nameInp = document.getElementById("pin-reg-name");
      const pinInp = document.getElementById("pin-reg-pin");
      const pin2Inp = document.getElementById("pin-reg-pin2");
      const name = nameInp ? nameInp.value.trim() : "";
      const pin = pinInp ? pinInp.value.trim() : "";
      const pin2 = pin2Inp ? pin2Inp.value.trim() : "";
      if (!name) { state.pinGateError = "Enter your name."; render(); return; }
      if (!/^\d{4}$/.test(pin)) { state.pinGateError = "PIN must be exactly 4 digits."; render(); return; }
      if (pin !== pin2) { state.pinGateError = "PINs don't match."; render(); return; }
      const cloudEmployees = await fbPull("employees");
      const employees = cloudEmployees !== null ? cloudEmployees : loadEmployees();
      if (employees.some(e => e.name.toLowerCase() === name.toLowerCase())) {
        state.pinGateError = "That name is already registered — pick your name from the list instead of creating a new one.";
        render(); return;
      }
      const hash = await sha256Hex(name.toLowerCase() + "|" + pin);
      const newEmp = { id: uid(), name, pinHash: hash, avatar: state.pinRegAvatar, createdAt: Date.now() };
      employees.push(newEmp);
      saveEmployees(employees);
      fbPush("employees", newEmp.id, newEmp);
      state.currentEmployeeId = newEmp.id;
      try { sessionStorage.setItem(CURRENT_EMPLOYEE_KEY, newEmp.id); } catch(e) {}
      state.pinGateRegistering = false; state.pinGateError = null;
      if (isMaintenanceOn() && !isAdminUser()) { showMaintenanceScreen(); return; }
      state.view = "dashboard";
      render();
      return;
    }
    case "switch-employee":
      state.currentEmployeeId = null;
      try { sessionStorage.removeItem(CURRENT_EMPLOYEE_KEY); } catch(e) {}
      state.pinGateSelectedId = null; state.pinGateRegistering = false; state.pinGateError = null;
      state.profileMenuOpen = false;
      state.view = "pin-gate";
      render();
      return;
    case "toggle-profile-menu":
      state.profileMenuOpen = !state.profileMenuOpen; render(); return;
    case "close-profile-menu":
      state.profileMenuOpen = false; render(); return;
    case "profile-my-progress":
      state.profileMenuOpen = false; state.view = "leaderboard"; state.leaderboardTab = "mine"; render(); return;
    case "pin-reg-avatar-select":
      state.pinRegAvatar = el.getAttribute("data-avatar"); render(); return;
    case "open-avatar-modal":
      state.profileMenuOpen = false; state.avatarModalOpen = true; render(); return;
    case "close-avatar-modal":
      state.avatarModalOpen = false; render(); return;
    case "avatar-select": {
      const avatar = el.getAttribute("data-avatar");
      const list = loadEmployees();
      const target = list.find(e => e.id === state.currentEmployeeId);
      if (target) {
        target.avatar = avatar;
        saveEmployees(list);
        fbPush("employees", target.id, target);
      }
      state.avatarModalOpen = false;
      showToast("Avatar updated.");
      render();
      return;
    }
    case "open-cert-modal":
      state.profileMenuOpen = false; state.certModalOpen = true; state.certPhotoDataUrl = null; state.certError = null; render(); return;
    case "close-cert-modal":
      state.certModalOpen = false; render(); return;
    case "submit-cert": {
      const emp = state.currentEmployeeId ? loadEmployees().find(e => e.id === state.currentEmployeeId) : null;
      if (!emp) { state.certError = "Check in with your name first."; render(); return; }
      if (!state.certPhotoDataUrl) { state.certError = "Choose a photo first."; render(); return; }
      const typeSel = document.getElementById("cert-type-select");
      const dateInp = document.getElementById("cert-date-input");
      const certification = typeSel ? typeSel.value : "";
      const dateEarned = dateInp ? dateInp.value : "";
      if (!certification) { state.certError = "Pick which certification this is."; render(); return; }
      if (!dateEarned) { state.certError = "Add the date you earned it."; render(); return; }
      const list = loadCertificates();
      const newCert = { id: uid(), employeeId: emp.id, employeeName: emp.name, photo: state.certPhotoDataUrl, certification, dateEarned, submittedAt: Date.now() };
      list.push(newCert);
      try {
        saveCertificates(list);
      } catch(e) {
        state.certError = "Storage is full on this device — try a smaller photo, or clear out old data.";
        render();
        return;
      }
      fbPush("certificates", newCert.id, newCert);
      state.certModalOpen = false; state.certPhotoDataUrl = null; state.certError = null;
      showToast("Certificate posted!");
      render();
      return;
    }
    case "open-leaderboard":
      state.view = "leaderboard"; render(); return;
    case "leaderboard-tab":
      state.leaderboardTab = el.getAttribute("data-tab"); render(); return;
    case "leaderboard-sort":
      state.leaderboardSort = el.getAttribute("data-sort"); render(); return;
    case "go-home":
      state.view = "dashboard"; state.session = null; render(); break;
    case "new-set": {
      const defaultFolder = (state.activeFolder && state.activeFolder !== "__unfiled") ? state.activeFolder : null;
      state.editorDraft = { id: uid(), name:"", description:"", cards:[{id:uid(),term:"",definition:"",explanation:""}], folder: defaultFolder, _isNew:true };
      state.editorReturnView = "dashboard";
      state.view = "editor"; render(); break;
    }
    case "edit-set": {
      const id = el.getAttribute("data-id");
      const s = state.sets.find(x=>x.id===id);
      if (s) {
        state.editorDraft = JSON.parse(JSON.stringify(s)); state.editorDraft._isNew=false;
        state.editorReturnView = (state.view === "mode-select") ? "mode-select" : "dashboard";
        state.activeSetId = id;
        state.view="editor"; render();
      }
      break;
    }
    case "cancel-editor":
      state.view = state.editorReturnView || "dashboard"; render(); break;
    case "add-card":
      state.editorDraft.cards.push({id:uid(),term:"",definition:"",explanation:""}); render(); break;
    case "remove-card": {
      const cardId = el.getAttribute("data-card-id");
      if (state.editorDraft.cards.length > 1) state.editorDraft.cards = state.editorDraft.cards.filter(c=>c.id!==cardId);
      render(); break;
    }
    case "save-set": {
      const d = state.editorDraft;
      const name = (d.name||"").trim();
      const cleaned = d.cards
        .filter(c => c.term.trim() && c.definition.trim())
        .map(c => ({ id: c.id, term: c.term.trim(), definition: c.definition.trim(), explanation: (c.explanation || "").trim() }));
      if (!name || cleaned.length===0) { showToast("Add a name and at least one complete card."); return; }
      persistActiveSetEdit({ id:d.id, name, description:(d.description||"").trim(), cards:cleaned, folder: d.folder || null });
      state.view = "dashboard"; render(); break;
    }
    case "open-set": {
      state.activeSetId = el.getAttribute("data-id");
      state.session = null;
      state.view = "mode-select"; render(); break;
    }
    case "confirm-delete":
      state.confirmDeleteId = el.getAttribute("data-id"); render(); break;
    case "close-modal": case "close-modal-bg":
      state.confirmDeleteId = null; render(); break;
    case "delete-set":
      deleteSet(el.getAttribute("data-id")); state.confirmDeleteId = null; render(); break;
    case "pick-mode":
      state.session = null;
      state.view = el.getAttribute("data-mode"); render(); break;
    case "exit-mode":
      if (state.session && state.session.timer) clearInterval(state.session.timer);
      state.session = null; state.view = "mode-select"; render(); break;

    // flashcards
    case "flip-card":
      state.session.flipped = !state.session.flipped; render(); break;
    case "shuffle-flash":
      state.session.order = shuffle(state.session.order); render(); break;
    case "flash-next": {
      if (state.session._advancing) return; // already moving to the next card
      state.session._advancing = true;
      const mark = el.getAttribute("data-mark");
      const s = getActiveSet();
      const card = s.cards[state.session.order[state.session.i]];
      state.session.known[card.id] = mark;
      state.session.flipped = false;
      if (mark === "known" && state.currentEmployeeId) recordMastered(state.currentEmployeeId, s.id, card.id);
      setTimeout(() => { state.session.i++; state.session._advancing = false; render(); }, 120);
      return;
    }
    case "flash-prev": {
      const ses = state.session;
      if (!ses || ses.i <= 0) return;
      ses.i--; ses.flipped = false;
      render();
      return;
    }
    case "flash-forward": {
      const ses = state.session;
      if (!ses || ses.i >= ses.order.length - 1) return;
      ses.i++; ses.flipped = false;
      render();
      return;
    }
    case "restart-flashcards": {
      const missed = el.getAttribute("data-missed") === "1";
      const s = getActiveSet();
      let base = s.cards.map((_,i)=>i);
      if (missed) {
        const missedIdx = base.filter(i => state.session.known[s.cards[i].id] === "unknown");
        base = missedIdx.length ? missedIdx : base;
      }
      state.session = { mode:"flashcards", order: shuffle(base), i:0, flipped:false, known:{} };
      render(); break;
    }

    // learn
    case "start-learn": {
      const s = getActiveSet();
      const direction = el.getAttribute("data-direction") || "defToTerm";
      state.session = { mode:"learn", queue: buildLearnQueue(s.cards, state.currentEmployeeId, s.id), qi:0, selected:null, correct:0, total:0, missedIds:[], direction };
      render(); return;
    }
    case "learn-choose": {
      const ses = state.session;
      if (ses.selected) return; // already answered this question — ignore extra clicks
      const optId = el.getAttribute("data-opt-id");
      const cur = ses.queue[ses.qi];
      ses.selected = optId;
      ses.total++;
      const wasRight = optId === cur.card.id;
      if (wasRight) {
        ses.correct++;
      } else if (!ses.missedIds.includes(cur.card.id)) {
        ses.missedIds.push(cur.card.id);
      }
      if (state.currentEmployeeId) {
        recordLearnAnswer(state.currentEmployeeId, wasRight);
        if (wasRight) { const s = getActiveSet(); recordMastered(state.currentEmployeeId, s.id, cur.card.id); }
      }
      render();
      return;
    }
    case "learn-continue": {
      const ses = state.session;
      ses.selected = null;
      ses.qi++;
      render();
      return;
    }
    case "restart-learn": {
      const s = getActiveSet();
      const wantMissedOnly = el.getAttribute("data-missed") === "1";
      const prevMissedIds = (state.session && state.session.missedIds) || [];
      const prevDirection = (state.session && state.session.direction) || "defToTerm";
      let pool = s.cards;
      if (wantMissedOnly) {
        const missedCards = s.cards.filter(c => prevMissedIds.includes(c.id));
        pool = missedCards.length ? missedCards : s.cards;
      }
      state.session = { mode:"learn", queue: buildLearnQueue(pool, state.currentEmployeeId, s.id), qi:0, selected:null, correct:0, total:0, missedIds:[], direction: prevDirection };
      render(); break;
    }

    // match
    case "match-pick": {
      const key = el.getAttribute("data-key");
      const ses = state.session;
      if (ses.done || ses.selected.includes(key)) return;
      const tile = ses.tiles.find(t=>t.key===key);
      if (!tile || tile.matched) return;
      ses.selected = [...ses.selected, key];
      render();
      if (ses.selected.length === 2) {
        const [a,b] = ses.selected.map(k => ses.tiles.find(t=>t.key===k));
        if (a.cardId === b.cardId) {
          setTimeout(() => {
            ses.tiles.forEach(t => { if (t.cardId===a.cardId) t.matched=true; });
            ses.selected = [];
            if (ses.tiles.every(t=>t.matched)) { ses.done = true; clearInterval(ses.timer); }
            render();
          }, 250);
        } else {
          ses.wrong = ses.selected;
          setTimeout(() => { ses.wrong = []; ses.selected = []; render(); }, 550);
        }
      }
      return;
    }
  }
}

/* ---------------- Init ---------------- */
document.getElementById("root").addEventListener("click", (e) => {
  const stopEl = e.target.closest("[data-stop]");
  const actionEl = e.target.closest("[data-action]");
  // If the click is inside a "stop" region (e.g. a modal box, or the edit/delete
  // buttons on a set card) but the nearest data-action is OUTSIDE that region
  // (e.g. the overlay behind the modal, or the card behind the buttons),
  // don't fire that outer action — this is what data-stop is for.
  if (stopEl && (!actionEl || !stopEl.contains(actionEl))) return;
  if (!actionEl) return;
  handleAction(actionEl.getAttribute("data-action"), actionEl);
});

/* ---------------- Site-wide login gate ---------------- */
const LOGIN_HASH = "dd015a0fdd97aa8bf83e923b9d06bbf377bd308becbca039fce9d31bb552cd5d";
const LOGIN_KEY = "wd_site_unlocked_v1";
const ACTIVITY_KEY = "wd_last_activity_v1";
const INACTIVITY_LIMIT_MS = 5 * 60 * 1000; // 5 minutes
const ADMIN_NO_TIMEOUT_KEY = "wd_admin_no_timeout_v1";

function isInactivityLockoutDisabled(){
  try { return localStorage.getItem(ADMIN_NO_TIMEOUT_KEY) === "1"; } catch(e) { return false; }
}
function setInactivityLockoutDisabled(on){
  try { localStorage.setItem(ADMIN_NO_TIMEOUT_KEY, on ? "1" : "0"); } catch(e) {}
}

function recordActivity(){
  try { sessionStorage.setItem(ACTIVITY_KEY, String(Date.now())); } catch(e) {}
}
function getLastActivity(){
  try {
    const raw = sessionStorage.getItem(ACTIVITY_KEY);
    return raw ? parseInt(raw, 10) : 0;
  } catch(e) { return 0; }
}
function clearSession(){
  try { sessionStorage.removeItem(LOGIN_KEY); sessionStorage.removeItem(ACTIVITY_KEY); } catch(e) {}
}

function startApp(){
  try {
    const savedEmployeeId = sessionStorage.getItem(CURRENT_EMPLOYEE_KEY);
    const savedEmp = savedEmployeeId ? loadEmployees().find(e => e.id === savedEmployeeId) : null;
    if (savedEmp && !savedEmp.suspended) {
      state.currentEmployeeId = savedEmployeeId;
    } else {
      if (savedEmp && savedEmp.suspended) { try { sessionStorage.removeItem(CURRENT_EMPLOYEE_KEY); } catch(e) {} }
      state.view = "pin-gate";
    }
  } catch(e) { state.view = "pin-gate"; }

  if (isMaintenanceOn() && state.currentEmployeeId && !isAdminUser()) {
    showMaintenanceScreen();
    return;
  }

  render();
  const splashLogoSlot = document.getElementById("splash-logo-slot");
  if (splashLogoSlot) splashLogoSlot.innerHTML = logoMark(56);
  const splash = document.getElementById("splash");
  if (splash) splash.style.display = "flex";
  setTimeout(() => {
    if (!splash) return;
    splash.classList.add("fade-out");
    setTimeout(() => splash.remove(), 450);
  }, 600);
  setupActivityTracking();
  // Pull the latest shared data in the background — the app is already usable
  // locally, this just brings it up to date with what the team has added.
  syncSetsFromCloud();
  syncEmployeesFromCloud();
  syncCertificatesFromCloud();
  syncFeedbackFromCloud();
  syncProgressFromCloud();
  setInterval(() => {
    if (state.view !== "dashboard") return;
    if (document.querySelector(".modal-overlay, .sidebar-overlay")) return; // any modal open (e.g. admin passcode) — don't wipe it out
    const active = document.activeElement;
    if (active && ["INPUT","TEXTAREA","SELECT"].includes(active.tagName)) return; // don't interrupt typing anywhere
    if (loadCertificates().length > 1) {
      state.certCarouselIndex = state.certCarouselIndex + 1;
      render();
    }
  }, 12000);
  setInterval(() => {
    if (state.view !== "dashboard") return;
    if (document.querySelector(".modal-overlay, .sidebar-overlay")) return;
    const active = document.activeElement;
    if (active && ["INPUT","TEXTAREA","SELECT"].includes(active.tagName)) return;
    state.leaderboardCarouselIndex = state.leaderboardCarouselIndex + 1;
    render();
  }, 15000);
}

function setupActivityTracking(){
  recordActivity();
  // Throttle writes — only record on real interaction, not every mousemove tick.
  let lastWrite = Date.now();
  ["click", "keydown", "scroll", "touchstart"].forEach(evt => {
    document.addEventListener(evt, () => {
      const now = Date.now();
      if (now - lastWrite > 3000) { lastWrite = now; recordActivity(); }
    }, { passive: true });
  });
  // Periodically check whether the inactivity window has been exceeded —
  // catches both "sat idle" and "closed the tab and came back later".
  setInterval(() => {
    if (isAdminUser() && isInactivityLockoutDisabled()) return;
    if (Date.now() - getLastActivity() > INACTIVITY_LIMIT_MS) {
      forceLogout("Your session timed out after 5 minutes — please log in again.");
    }
  }, 15000);
  // Credit active study time to whoever is checked in, in 30s increments,
  // but only while they've interacted recently (not just sitting idle).
  setInterval(() => {
    if (state.currentEmployeeId && (Date.now() - getLastActivity() < 60000)) {
      addStudyTime(state.currentEmployeeId, 30000);
    }
  }, 30000);
}

function showMaintenanceScreen(){
  document.body.innerHTML = `
    <div style="min-height:100vh;background:var(--blueDark);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;">
      <svg width="130" height="130" viewBox="0 0 100 100" style="margin-bottom:24px;">
        <defs><linearGradient id="maintcat" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#FDBA58"/><stop offset="100%" stop-color="#F4990B"/>
        </linearGradient></defs>
        <path d="M20 38 L31 8 L42 34 Z" fill="url(#maintcat)"/>
        <path d="M80 38 L69 8 L58 34 Z" fill="url(#maintcat)"/>
        <circle cx="50" cy="56" r="36" fill="url(#maintcat)"/>
        <circle cx="37" cy="53" r="4.5" fill="#12283F"/>
        <circle cx="63" cy="53" r="4.5" fill="#12283F"/>
        <path d="M44 68 Q50 74 56 68" stroke="#12283F" stroke-width="3" fill="none" stroke-linecap="round"/>
      </svg>
      <h1 class="wd-h" style="color:#fff;font-size:26px;margin:0 0 10px;">Hang in there!</h1>
      <p style="color:#B9C6D9;font-size:15px;margin:0;max-width:320px;">We'll be back.</p>
    </div>`;
}

function forceLogout(message){
  clearSession();
  const root = document.getElementById("root");
  if (root) root.innerHTML = "";
  const gate = document.getElementById("login-gate");
  if (gate) gate.style.display = "flex";
  const errorEl = document.getElementById("login-error");
  if (errorEl && message) errorEl.textContent = message;
  const userInput = document.getElementById("login-username");
  const passInput = document.getElementById("login-password");
  if (userInput) userInput.value = "";
  if (passInput) passInput.value = "";
}

function initLoginGate(){
  const gate = document.getElementById("login-gate");
  const loginLogoSlot = document.getElementById("login-logo-slot");
  if (loginLogoSlot) {
    loginLogoSlot.innerHTML = `
      ${logoMark(56)}
      <span class="wd-h" style="font-size:22px;font-weight:800;margin-top:4px;background:linear-gradient(135deg,#FDBA58,#F4990B);-webkit-background-clip:text;background-clip:text;color:transparent;">StudyDay</span>
    `;
  }

  let unlocked = false;
  try { unlocked = sessionStorage.getItem(LOGIN_KEY) === "1"; } catch(e) {}
  const withinWindow = unlocked && (Date.now() - getLastActivity() < INACTIVITY_LIMIT_MS);

  if (withinWindow) {
    gate.style.display = "none";
    startApp();
    return;
  }
  if (unlocked && !withinWindow) {
    clearSession(); // stale session — require login again
  }

  const userInput = document.getElementById("login-username");
  const passInput = document.getElementById("login-password");
  const errorEl = document.getElementById("login-error");
  const submitBtn = document.getElementById("login-submit");

  async function attempt(){
    const u = (userInput.value || "").trim().toLowerCase();
    const p = passInput.value || "";
    if (!u || !p) { errorEl.textContent = "Enter both a username and password."; return; }
    const hash = await sha256Hex(u + "|" + p);
    if (hash === LOGIN_HASH) {
      try { sessionStorage.setItem(LOGIN_KEY, "1"); } catch(e) {}
      recordActivity();
      gate.style.display = "none";
      startApp();
    } else {
      errorEl.textContent = "Incorrect username or password.";
    }
  }
  submitBtn.addEventListener("click", attempt);
  [userInput, passInput].forEach(inp => inp.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); attempt(); }
  }));
}
initLoginGate();
</script>
